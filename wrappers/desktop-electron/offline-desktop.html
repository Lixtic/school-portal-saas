<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School Portal Desktop</title>
  <style>
    body {
      margin: 0;
      font-family: Segoe UI, Arial, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f4f8f7;
      color: #12332d;
      padding: 24px;
    }
    .card {
      max-width: 560px;
      width: 100%;
      background: #fff;
      border: 1px solid #d6e5e1;
      border-radius: 14px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.1);
      padding: 28px;
    }
    h1 { margin: 0 0 10px; }
    p { color: #35544e; line-height: 1.55; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Desktop Wrapper Started</h1>
    <p>Could not load the configured School Portal URL. Ensure your app server is running or set <strong>SCHOOL_PORTAL_URL</strong> before launching.</p>
  </main>
</body>
</html>
