<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portals Mobile Wrapper</title>
  <style>
    body {
      margin: 0;
      font-family: Segoe UI, Arial, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f4f8f7;
      color: #12332d;
      padding: 24px;
    }
    .card {
      max-width: 520px;
      width: 100%;
      background: #fff;
      border-radius: 12px;
      border: 1px solid #d6e5e1;
      padding: 24px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.08);
    }
    h1 { margin-top: 0; font-size: 1.3rem; }
    p { line-height: 1.55; color: #35544e; }
    code { background: #edf4f2; padding: 1px 5px; border-radius: 4px; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Portals Mobile Wrapper</h1>
    <p>This screen is a fallback. In production the app loads the remote website configured in <code>capacitor.config.ts</code>.</p>
  </main>
</body>
</html>
