{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row min-vh-75 justify-content-center align-items-center">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0 shadow-lg" style="border-radius: 20px; background: linear-gradient(145deg, #1a1a2e, #16213e);">
                <div class="card-body text-center p-5">
                    
                    <!-- Aura Visualizer -->
                    <div class="mb-5 position-relative">
                        <div id="aura-ring" class="rounded-circle mx-auto d-flex align-items-center justify-content-center" 
                             style="width: 150px; height: 150px; border: 2px solid rgba(0, 255, 255, 0.3); box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);">
                            <div id="aura-core" class="rounded-circle bg-info" 
                                 style="width: 100px; height: 100px; opacity: 0.8; box-shadow: 0 0 20px #0dcaf0; transition: all 0.3s ease;">
                            </div>
                        </div>
                        <div id="status-text" class="mt-4 text-info fw-bold">Tap to Start</div>
                    </div>

                    <!-- Controls -->
                    <button id="mic-btn" class="btn btn-lg btn-outline-info rounded-pill px-5 py-3 mb-3">
                        <i class="fas fa-microphone me-2"></i> <span id="btn-text">Start Talking</span>
                    </button>
                    
                    <div class="text-muted small mt-3">
                        <i class="fas fa-wave-square me-1"></i> 
                        <span id="listening-indicator" style="visibility: hidden;">Listening...</span>
                    </div>

                    <!-- Conversation Log (Hidden by default, optional debug) -->
                    <div id="debug-log" class="mt-4 text-start small text-white-50 d-none"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    @keyframes pulse-ring {
        0% { transform: scale(1); opacity: 0.3; }
        50% { transform: scale(1.1); opacity: 0.1; }
        100% { transform: scale(1); opacity: 0.3; }
    }
    
    @keyframes core-pulse {
        0% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(0.95); opacity: 0.9; }
        100% { transform: scale(1); opacity: 0.8; }
    }
    
    @keyframes core-thinking {
        0% { background-color: #0dcaf0; box-shadow: 0 0 20px #0dcaf0; }
        50% { background-color: #d63384; box-shadow: 0 0 30px #d63384; }
        100% { background-color: #0dcaf0; box-shadow: 0 0 20px #0dcaf0; }
    }
    
    @keyframes core-speaking {
        0% { transform: scale(1); }
        20% { transform: scale(1.2); }
        40% { transform: scale(0.9); }
        60% { transform: scale(1.1); }
        80% { transform: scale(0.95); }
        100% { transform: scale(1); }
    }

    .aura-listening #aura-ring { animation: pulse-ring 2s infinite; }
    .aura-thinking #aura-core { animation: core-thinking 2s infinite; }
    .aura-speaking #aura-core { animation: core-speaking 0.5s infinite; }
</style>

<script>
    class AuraVoice {
        constructor() {
            this.mediaRecorder = null;
            this.audioChunks = [];
            this.isListening = false;
            this.audioContext = null;
            this.analyser = null;
            this.silenceTimer = null;
            this.silenceThreshold = 0.02; // Adjust based on noise
            this.silenceDuration = 1500; // ms of silence to trigger stop
            
            this.elements = {
                btn: document.getElementById('mic-btn'),
                btnText: document.getElementById('btn-text'),
                status: document.getElementById('status-text'),
                core: document.getElementById('aura-core'),
                container: document.querySelector('.card-body'),
                indicator: document.getElementById('listening-indicator')
            };

            this.setupListeners();
        }

        setupListeners() {
            this.elements.btn.addEventListener('click', () => {
                if (!this.isListening) {
                    this.startListening();
                } else {
                    this.stopListening();
                }
            });
        }

        async startListening() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                this.mediaRecorder = new MediaRecorder(stream);
                this.audioChunks = [];

                this.mediaRecorder.ondataavailable = (event) => {
                    this.audioChunks.push(event.data);
                };

                this.mediaRecorder.onstop = () => {
                    this.processAudio();
                    // Stop all tracks
                    stream.getTracks().forEach(track => track.stop());
                };

                this.mediaRecorder.start();
                this.isListening = true;
                this.updateUI('listening');
                this.initVAD(stream);
            } catch (err) {
                console.error("Mic access error:", err);
                alert("Please allow microphone access to talk to Aura.");
            }
        }

        stopListening() {
            if (this.mediaRecorder && this.mediaRecorder.state !== 'inactive') {
                this.mediaRecorder.stop();
                this.isListening = false;
                if (this.audioContext) {
                    this.audioContext.close();
                    this.audioContext = null;
                }
            }
        }

        initVAD(stream) {
            this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = this.audioContext.createMediaStreamSource(stream);
            this.analyser = this.audioContext.createAnalyser();
            this.analyser.fftSize = 256;
            source.connect(this.analyser);

            const bufferLength = this.analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            const checkSilence = () => {
                if (!this.isListening) return;

                this.analyser.getByteFrequencyData(dataArray);
                
                // Calculate average volume
                let sum = 0;
                for(let i = 0; i < bufferLength; i++) {
                    sum += dataArray[i];
                }
                const average = sum / bufferLength / 255; // Normalized 0-1

                // Visualizer effect
                const scale = 1 + average;
                this.elements.core.style.transform = `scale(${scale})`;

                // VAD Logic
                if (average > this.silenceThreshold) {
                    // Speech detected
                    if (this.silenceTimer) {
                        clearTimeout(this.silenceTimer);
                        this.silenceTimer = null;
                    }
                } else {
                    // Silence (or background noise)
                    if (!this.silenceTimer) {
                        this.silenceTimer = setTimeout(() => {
                            if (this.isListening) {
                                console.log("Silence detected, stopping...");
                                this.stopListening();
                            }
                        }, this.silenceDuration);
                    }
                }

                requestAnimationFrame(checkSilence);
            };

            checkSilence();
        }

        async processAudio() {
            this.updateUI('thinking');
            const audioBlob = new Blob(this.audioChunks, { type: 'audio/webm' });
            
            const formData = new FormData();
            formData.append('audio', audioBlob, 'recording.webm');

            try {
                const response = await fetch("{% url 'students:process_voice' %}", {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'X-CSRFToken': '{{ csrf_token }}'
                    }
                });

                if (response.ok) {
                    const audioBlob = await response.blob();
                    this.playResponse(audioBlob);
                } else {
                    const error = await response.json();
                    console.error("API Error:", error);
                    this.updateUI('error', error.error || "Connection failed");
                }
            } catch (err) {
                console.error("Network Error:", err);
                this.updateUI('error', "Network error");
            }
        }

        playResponse(blob) {
            this.updateUI('speaking');
            const audioUrl = URL.createObjectURL(blob);
            const audio = new Audio(audioUrl);
            
            audio.onended = () => {
                this.updateUI('idle');
                URL.revokeObjectURL(audioUrl);
            };
            
            audio.play().catch(e => {
                console.error("Playback failed:", e);
                this.updateUI('error', "Playback failed");
            });
        }

        updateUI(state, message = "") {
            const { btn, btnText, status, container, indicator } = this.elements;
            
            container.classList.remove('aura-listening', 'aura-thinking', 'aura-speaking');

            switch(state) {
                case 'idle':
                    btnText.innerText = "Start Talking";
                    status.innerText = "Tap to Start";
                    status.className = "mt-4 text-info fw-bold";
                    btn.disabled = false;
                    indicator.style.visibility = 'hidden';
                    break;
                case 'listening':
                    container.classList.add('aura-listening');
                    btnText.innerText = "Listening...";
                    status.innerText = "Listening...";
                    btn.disabled = false; // Allow manual stop
                    indicator.style.visibility = 'visible';
                    break;
                case 'thinking':
                    container.classList.add('aura-thinking');
                    btnText.innerText = "Processing...";
                    status.innerText = "Aura is thinking...";
                    btn.disabled = true;
                    indicator.style.visibility = 'hidden';
                    break;
                case 'speaking':
                    container.classList.add('aura-speaking');
                    btnText.innerText = "Speaking...";
                    status.innerText = "Aura is replying...";
                    btn.disabled = true;
                    break;
                case 'error':
                    status.innerText = message || "Error occurred";
                    status.className = "mt-4 text-danger fw-bold";
                    btnText.innerText = "Try Again";
                    btn.disabled = false;
                    break;
            }
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const aura = new AuraVoice();
    });
</script>
{% endblock %}
