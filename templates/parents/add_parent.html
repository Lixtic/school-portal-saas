{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Add Parent{% endblock %}

{% block extra_css %}
<style>
    [data-bs-theme="dark"] .card {
        background: var(--card-bg, #1e293b);
        border-color: rgba(255,255,255,0.08);
    }
    [data-bs-theme="dark"] .card-header {
        background: var(--card-bg, #1e293b) !important;
        border-color: rgba(255,255,255,0.08);
    }
    [data-bs-theme="dark"] .card-body { color: #e2e8f0; }
    [data-bs-theme="dark"] .form-control,
    [data-bs-theme="dark"] .form-select {
        background: rgba(255,255,255,0.05);
        border-color: rgba(255,255,255,0.15);
        color: #e2e8f0;
    }
    [data-bs-theme="dark"] .form-label { color: #cbd5e1; }
    [data-bs-theme="dark"] .form-text { color: #94a3b8; }
    [data-bs-theme="dark"] .text-muted { color: #94a3b8 !important; }
</style>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-transparent py-3 border-bottom">
                <h5 class="mb-0 fw-bold">Add New Parent</h5>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                        <a href="{% url 'dashboard' %}" class="btn btn-light me-md-2">Cancel</a>
                        <button type="submit" class="btn btn-primary px-4">Add Parent</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
