<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Remote — {{ deck.title }}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #0f0b1a;
    --surface: #1a1425;
    --border: #2d2640;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --violet: #7c3aed;
    --violet-glow: rgba(124,58,237,0.3);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Manrope', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100dvh; display: flex; flex-direction: column;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
}

/* ── Header ── */
.rc-header {
    padding: 1rem 1.25rem 0.75rem;
    text-align: center;
    border-bottom: 1px solid var(--border);
}
.rc-title {
    font-size: 0.88rem; font-weight: 800;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 280px; margin: 0 auto;
}
.rc-badge {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 0.4rem; font-size: 0.68rem; font-weight: 600;
    color: #10b981; letter-spacing: 0.03em; text-transform: uppercase;
}
.rc-badge::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: #10b981; animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

/* ── Slide Counter ── */
.rc-counter-wrap {
    flex: 1; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 0.75rem; padding: 1.5rem 1rem;
}
.rc-slide-num {
    font-size: 5rem; font-weight: 800;
    background: linear-gradient(135deg, #7c3aed, #a78bfa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    line-height: 1;
}
.rc-slide-total {
    font-size: 1rem; color: var(--muted); font-weight: 600;
}
.rc-progress {
    width: 80%; max-width: 300px; height: 4px;
    background: var(--border); border-radius: 4px; overflow: hidden;
}
.rc-progress-bar {
    height: 100%; background: linear-gradient(90deg, #7c3aed, #a78bfa);
    border-radius: 4px; transition: width 0.3s ease;
}

/* ── Controls ── */
.rc-controls {
    padding: 0 1rem 1.5rem;
    display: flex; flex-direction: column; gap: 0.75rem;
}
.rc-nav-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;
}
.rc-btn {
    display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    padding: 1.25rem 1rem; border-radius: 16px;
    font-family: inherit; font-size: 1rem; font-weight: 700;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text); cursor: pointer;
    transition: all 0.15s ease; position: relative; overflow: hidden;
}
.rc-btn:active {
    transform: scale(0.93);
    background: rgba(124,58,237,0.2);
    border-color: var(--violet);
    box-shadow: 0 0 12px var(--violet-glow);
}
.rc-btn-primary {
    background: var(--violet); border-color: var(--violet); color: #fff;
    box-shadow: 0 4px 20px var(--violet-glow);
}
.rc-btn-primary:active {
    background: #6d28d9; transform: scale(0.93);
    box-shadow: 0 0 20px var(--violet-glow);
}
.rc-btn svg { width: 24px; height: 24px; }
.rc-btn-sm {
    padding: 0.65rem; font-size: 0.82rem;
}

.rc-quick-row {
    display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 0.5rem;
}

/* ── Reaction Row ── */
.rc-reaction-row {
    display: flex; justify-content: center; gap: 0.6rem;
    padding: 0.5rem 0;
}
.rc-react-btn {
    width: 48px; height: 48px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border);
    font-size: 1.3rem; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    transition: all 0.15s ease;
}
.rc-react-btn:active {
    transform: scale(1.2);
    border-color: var(--violet);
    box-shadow: 0 0 16px var(--violet-glow);
}

/* ── Go-to-slide ── */
.rc-goto-row {
    display: flex; gap: 0.5rem; align-items: center;
}
.rc-goto-input {
    flex: 1; padding: 0.65rem 0.75rem; border-radius: 10px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: inherit; font-size: 0.88rem;
    text-align: center; outline: none;
}
.rc-goto-input:focus { border-color: var(--violet); }

/* ── Disconnected overlay ── */
.rc-disconnected {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    display: none; align-items: center; justify-content: center;
    flex-direction: column; gap: 1rem; z-index: 100;
    color: #ef4444; font-weight: 700; font-size: 1.1rem;
}
.rc-disconnected.show { display: flex; }

/* ── Toast ── */
.rc-toast {
    position: fixed; top: 1rem; left: 50%; transform: translateX(-50%);
    background: #059669; color: #fff; padding: 0.5rem 1.2rem;
    border-radius: 10px; font-size: 0.78rem; font-weight: 600;
    box-shadow: 0 4px 20px rgba(0,0,0,.3); z-index: 200;
    opacity: 0; transition: opacity 0.2s; pointer-events: none;
}
.rc-toast.show { opacity: 1; }
.rc-toast.error { background: #dc2626; }

/* ── Speaker notes ── */
.rc-notes {
    display: none; margin: 0 1.25rem;
    padding: 0.7rem 0.85rem; border-radius: 10px;
    background: rgba(255,255,255,.04);
    border: 1px solid var(--border);
    max-height: 140px; overflow-y: auto;
    -webkit-overflow-scrolling: touch;
}
.rc-notes.active { display: block; }
.rc-notes-label {
    font-size: 0.62rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--violet); margin-bottom: 0.35rem;
    display: flex; align-items: center; gap: 0.35rem;
}
.rc-notes-text {
    font-size: 0.78rem; line-height: 1.55; color: var(--muted);
    white-space: pre-wrap; word-break: break-word;
}
.rc-notes::-webkit-scrollbar { width: 3px; }
.rc-notes::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Slide title + preview ── */
.rc-slide-info {
    margin: 0 1.25rem; padding: 0.6rem 0.85rem;
    border-radius: 10px; background: rgba(255,255,255,.04);
    border: 1px solid var(--border);
}
.rc-slide-title {
    font-size: 0.82rem; font-weight: 700; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 0.4rem;
}
.rc-slide-title:empty { display: none; }
.rc-slide-preview {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;
}
.rc-preview-card {
    border-radius: 8px; overflow: hidden;
    background: rgba(255,255,255,.03); border: 1px solid var(--border);
    min-height: 52px; position: relative;
}
.rc-preview-card .label {
    position: absolute; top: 4px; left: 6px;
    font-size: 0.55rem; font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--muted); opacity: 0.8;
}
.rc-preview-card img {
    width: 100%; height: auto; display: block;
}
.rc-preview-card .title {
    padding: 4px 6px; font-size: 0.62rem; font-weight: 600;
    color: var(--muted); white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis;
}
.rc-preview-card.empty {
    display: flex; align-items: center; justify-content: center;
    font-size: 0.6rem; color: var(--muted); opacity: 0.5;
}

/* ── Blackout button ── */
.rc-blackout-btn {
    display: flex; align-items: center; justify-content: center; gap: 0.4rem;
    width: 100%; padding: 0.6rem; border-radius: 12px;
    font-family: inherit; font-size: 0.78rem; font-weight: 700;
    border: 1.5px solid var(--border); background: var(--surface);
    color: var(--muted); cursor: pointer; transition: all 0.2s;
    text-transform: uppercase; letter-spacing: 0.04em;
}
.rc-blackout-btn.active {
    background: rgba(15,15,15,.9); border-color: #555;
    color: #fff;
}

/* ── Tools row (draw, media) ── */
.rc-tools-row {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.4rem;
    margin-top: 0.4rem;
}
.rc-tool-btn {
    display: flex; align-items: center; justify-content: center; gap: 0.3rem;
    padding: 0.55rem 0.3rem; border-radius: 10px;
    font-family: inherit; font-size: 0.68rem; font-weight: 700;
    border: 1.5px solid var(--border); background: var(--surface);
    color: var(--muted); cursor: pointer; transition: all 0.2s;
    text-transform: uppercase; letter-spacing: 0.03em;
}
.rc-tool-btn.active {
    background: rgba(124,58,237,.12); border-color: var(--violet);
    color: var(--violet);
}
.rc-tool-btn:active { transform: scale(0.96); }
.rc-draw-colors {
    display: none; gap: 0.4rem; margin-top: 0.35rem;
    align-items: center; justify-content: center;
}
.rc-draw-colors.active { display: flex; }
.rc-color-dot {
    width: 24px; height: 24px; border-radius: 50%;
    border: 2px solid transparent; cursor: pointer;
    transition: all 0.15s;
}
.rc-color-dot.sel { border-color: #fff; transform: scale(1.15); }
.rc-draw-action {
    padding: 0.35rem 0.7rem; border-radius: 8px;
    font-family: inherit; font-size: 0.62rem; font-weight: 700;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--muted); cursor: pointer; text-transform: uppercase;
}
.rc-draw-action:active { background: rgba(255,255,255,.08); }

/* ── Slide grid overlay ── */
.rc-grid-overlay {
    position: fixed; inset: 0; z-index: 60;
    background: rgba(15,11,26,.96);
    display: none; flex-direction: column;
    overflow: hidden;
}
.rc-grid-overlay.active { display: flex; }
.rc-grid-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.7rem 1rem;
    border-bottom: 1px solid var(--border);
}
.rc-grid-title {
    font-size: 0.78rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--text);
}
.rc-grid-close {
    padding: 0.35rem 0.7rem; border-radius: 8px; font-family: inherit;
    font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
    background: rgba(255,255,255,.06); border: 1px solid var(--border);
    color: var(--muted); cursor: pointer;
}
.rc-grid-close:active { background: rgba(255,255,255,.12); }
.rc-grid-body {
    flex: 1; overflow-y: auto; padding: 0.6rem;
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 0.5rem; align-content: start;
    -webkit-overflow-scrolling: touch;
}
.rc-grid-tile {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 0.6rem 0.4rem;
    text-align: center; cursor: pointer; transition: all 0.15s;
    display: flex; flex-direction: column; align-items: center;
    gap: 0.2rem; min-height: 56px; justify-content: center;
}
.rc-grid-tile:active { transform: scale(0.95); }
.rc-grid-tile.current {
    border-color: var(--violet);
    background: rgba(124,58,237,.12);
}
.rc-grid-tile .num {
    font-size: 1rem; font-weight: 800; color: var(--text);
    line-height: 1;
}
.rc-grid-tile .emoji { font-size: 1rem; line-height: 1; }
.rc-grid-tile .ttl {
    font-size: 0.55rem; font-weight: 600; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 100%;
}
.rc-grid-tile .layout-tag {
    font-size: 0.45rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.04em; color: var(--violet); opacity: 0.7;
}

/* ── Laser pointer touchpad ── */
.rc-laser-toggle {
    display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    width: 100%; padding: 0.7rem; border-radius: 12px;
    font-family: inherit; font-size: 0.82rem; font-weight: 700;
    border: 1.5px solid var(--border); background: var(--surface);
    color: var(--muted); cursor: pointer; transition: all 0.2s;
    text-transform: uppercase; letter-spacing: 0.04em;
}
.rc-laser-toggle .laser-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #ff4040;
    box-shadow: 0 0 6px 2px rgba(255,64,64,.4);
    transition: all 0.2s;
}
.rc-laser-toggle.active {
    background: rgba(255,64,64,.1); border-color: #ff4040;
    color: #ff6b6b;
}
.rc-laser-toggle.active .laser-dot {
    box-shadow: 0 0 10px 4px rgba(255,64,64,.6);
    animation: laserPulse 1.2s ease-in-out infinite;
}
@keyframes laserPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.4); } }

.rc-touchpad-overlay {
    position: fixed; inset: 0; z-index: 50;
    background: rgba(15,11,26,.92);
    display: none; flex-direction: column;
    touch-action: none;
}
.rc-touchpad-overlay.active { display: flex; }
.rc-touchpad-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.8rem 1rem;
    border-bottom: 1px solid var(--border);
}
.rc-touchpad-title {
    font-size: 0.78rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.05em; color: #ff6b6b;
    display: flex; align-items: center; gap: 0.5rem;
}
.rc-touchpad-title .dot {
    width: 6px; height: 6px; border-radius: 50%; background: #ff4040;
    box-shadow: 0 0 8px 3px rgba(255,64,64,.5);
    animation: laserPulse 1.2s ease-in-out infinite;
}
.rc-touchpad-close {
    padding: 0.4rem 0.8rem; border-radius: 8px; font-family: inherit;
    font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
    background: rgba(255,255,255,.06); border: 1px solid var(--border);
    color: var(--muted); cursor: pointer;
}
.rc-touchpad-close:active { background: rgba(255,255,255,.12); }
.rc-touchpad-surface {
    flex: 1; position: relative; overflow: hidden;
    cursor: crosshair;
}
.rc-touchpad-crosshair {
    position: absolute; pointer-events: none;
    width: 28px; height: 28px; transform: translate(-50%, -50%);
    display: none;
}
.rc-touchpad-crosshair.active { display: block; }
.rc-touchpad-crosshair::before,
.rc-touchpad-crosshair::after {
    content: ''; position: absolute;
    background: rgba(255,64,64,.6);
}
.rc-touchpad-crosshair::before {
    width: 1px; height: 100%; left: 50%; top: 0;
}
.rc-touchpad-crosshair::after {
    height: 1px; width: 100%; top: 50%; left: 0;
}
.rc-touchpad-dot {
    position: absolute; pointer-events: none; display: none;
    width: 14px; height: 14px; border-radius: 50%;
    background: radial-gradient(circle, #ff4040 25%, rgba(255,64,64,.5) 60%, transparent 100%);
    box-shadow: 0 0 10px 4px rgba(255,64,64,.4), 0 0 24px 8px rgba(255,64,64,.15);
    transform: translate(-50%, -50%);
}
.rc-touchpad-dot.active { display: block; }
.rc-touchpad-grid {
    position: absolute; inset: 0; pointer-events: none;
    background-image:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size: 20% 20%;
}
.rc-touchpad-hint {
    text-align: center; padding: 0.6rem;
    font-size: 0.68rem; color: var(--muted); font-weight: 600;
    border-top: 1px solid var(--border);
}
.rc-touchpad-nav {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0; 
    border-top: 1px solid var(--border);
}
.rc-touchpad-nav button {
    padding: 0.9rem; font-family: inherit; font-weight: 700;
    font-size: 0.82rem; border: none; cursor: pointer;
    background: rgba(255,255,255,.03); color: var(--text);
    transition: background 0.15s;
}
.rc-touchpad-nav button:first-child { border-right: 1px solid var(--border); }
.rc-touchpad-nav button:active { background: rgba(124,58,237,.15); }

/* ── Poll voting UI ── */
.rc-poll {
    display: none; padding: 1rem 1.25rem;
    border-top: 1px solid var(--border);
}
.rc-poll.active { display: block; }
.rc-poll-q {
    font-size: .92rem; font-weight: 700; margin-bottom: .75rem;
    line-height: 1.35;
}
.rc-poll-opts { display: flex; flex-direction: column; gap: .5rem; }
.rc-poll-opt {
    display: flex; align-items: center; gap: .6rem;
    padding: .75rem 1rem; border-radius: 12px;
    background: var(--surface); border: 2px solid var(--border);
    font-size: .88rem; font-weight: 600; cursor: pointer;
    transition: all .15s ease;
}
.rc-poll-opt:active, .rc-poll-opt.voted {
    border-color: var(--violet);
    background: rgba(124,58,237,.12);
}
.rc-poll-opt .opt-letter {
    width: 28px; height: 28px; border-radius: 8px;
    background: rgba(255,255,255,.06); display: flex;
    align-items: center; justify-content: center;
    font-size: .75rem; font-weight: 800; flex-shrink: 0;
}
.rc-poll-opt.voted .opt-letter {
    background: var(--violet); color: #fff;
}
.rc-poll-voted-msg {
    text-align: center; font-size: .78rem; color: #10b981;
    font-weight: 600; margin-top: .5rem; display: none;
}
.rc-poll-voted-msg.show { display: block; }
</style>
</head>
<body>

<div class="rc-header">
    <div class="rc-title">{{ deck.title }}</div>
    <div class="rc-badge" id="rcBadge">Connecting…</div>
</div>

<div class="rc-counter-wrap">
    <div class="rc-slide-num" id="slideNum">1</div>
    <div class="rc-slide-total">of <span id="totalSlides">{{ session.total_slides }}</span> slides</div>
    <div class="rc-progress"><div class="rc-progress-bar" id="progressBar" style="width:0%"></div></div>
</div>

<div class="rc-controls">
    <div class="rc-nav-row">
        <button class="rc-btn" onclick="sendCmd('prev')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
            Previous
        </button>
        <button class="rc-btn rc-btn-primary" onclick="sendCmd('next')">
            Next
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
        </button>
    </div>
    <div class="rc-quick-row">
        <button class="rc-btn rc-btn-sm" onclick="sendCmd('first')">First</button>
        <button class="rc-btn rc-btn-sm" onclick="sendCmd('last')">Last</button>
        <input class="rc-goto-input" id="gotoInput" type="number" min="1" max="{{ session.total_slides }}" placeholder="#" inputmode="numeric">
        <button class="rc-btn rc-btn-sm" onclick="gotoSlide()" style="background:var(--violet);color:#fff;border-color:var(--violet)">Go</button>
    </div>
    <div class="rc-reaction-row">
        <button class="rc-react-btn" onclick="sendCmd('reaction:👏')">👏</button>
        <button class="rc-react-btn" onclick="sendCmd('reaction:❤️')">❤️</button>
        <button class="rc-react-btn" onclick="sendCmd('reaction:😂')">😂</button>
        <button class="rc-react-btn" onclick="sendCmd('reaction:🎉')">🎉</button>
        <button class="rc-react-btn" onclick="sendCmd('reaction:🤔')">🤔</button>
    </div>

    <!-- Laser pointer + Blackout -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;">
        <button class="rc-laser-toggle" id="laserToggle" onclick="toggleLaserPad()">
            <span class="laser-dot"></span> Laser
        </button>
        <button class="rc-blackout-btn" id="blackoutBtn" onclick="toggleBlackout()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
            Blackout
        </button>
    </div>

    <!-- Tools row: Grid, Draw, Media -->
    <div class="rc-tools-row">
        <button class="rc-tool-btn" id="gridBtn" onclick="openSlideGrid()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            Grid
        </button>
        <button class="rc-tool-btn" id="drawBtn" onclick="toggleRemoteDraw()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/></svg>
            Draw
        </button>
        <button class="rc-tool-btn" id="mediaBtn" onclick="sendCmd('media:toggle')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5,3 19,12 5,21"/></svg>
            Media
        </button>
    </div>

    <!-- Draw controls (shown when draw active) -->
    <div class="rc-draw-colors" id="drawPanel">
        <span class="rc-color-dot sel" style="background:#ef4444" onclick="pickDrawColor(this,'#ef4444')"></span>
        <span class="rc-color-dot" style="background:#f59e0b" onclick="pickDrawColor(this,'#f59e0b')"></span>
        <span class="rc-color-dot" style="background:#22c55e" onclick="pickDrawColor(this,'#22c55e')"></span>
        <span class="rc-color-dot" style="background:#3b82f6" onclick="pickDrawColor(this,'#3b82f6')"></span>
        <span class="rc-color-dot" style="background:#ffffff" onclick="pickDrawColor(this,'#ffffff')"></span>
        <button class="rc-draw-action" onclick="sendCmd('draw:undo')">Undo</button>
        <button class="rc-draw-action" onclick="sendCmd('draw:clear')">Clear</button>
    </div>
</div>

<!-- Slide info + preview -->
<div class="rc-slide-info" id="slideInfo" style="display:none;">
    <div class="rc-slide-title" id="slideTitle"></div>
    <div class="rc-slide-preview">
        <div class="rc-preview-card" id="curPreview"><span class="label">Now</span><div class="title" id="curPreviewTitle">—</div></div>
        <div class="rc-preview-card" id="nextPreview"><span class="label">Next</span><div class="title" id="nextPreviewTitle">—</div></div>
    </div>
</div>

<!-- Speaker notes -->
<div class="rc-notes" id="speakerNotes">
    <div class="rc-notes-label">📝 Speaker Notes</div>
    <div class="rc-notes-text" id="notesText"></div>
</div>

<!-- Slide grid overlay -->
<div class="rc-grid-overlay" id="slideGridOverlay">
    <div class="rc-grid-header">
        <div class="rc-grid-title">Slides</div>
        <button class="rc-grid-close" onclick="closeSlideGrid()">✕ Close</button>
    </div>
    <div class="rc-grid-body" id="slideGridBody"></div>
</div>

<!-- Laser touchpad overlay -->
<div class="rc-touchpad-overlay" id="laserOverlay">
    <div class="rc-touchpad-header">
        <div class="rc-touchpad-title"><span class="dot"></span> Laser Pointer</div>
        <button class="rc-touchpad-close" onclick="toggleLaserPad()">✕ Close</button>
    </div>
    <div class="rc-touchpad-surface" id="laserSurface">
        <div class="rc-touchpad-grid"></div>
        <div class="rc-touchpad-crosshair" id="laserCrosshair"></div>
        <div class="rc-touchpad-dot" id="laserTouchDot"></div>
    </div>
    <div class="rc-touchpad-hint">Touch &amp; drag to move laser · Lift finger to hide</div>
    <div class="rc-touchpad-nav">
        <button onclick="sendCmd('prev')">◀ Prev</button>
        <button onclick="sendCmd('next')">Next ▶</button>
    </div>
</div>

<!-- Poll Voting Section -->
<div class="rc-poll" id="pollSection">
    <div class="rc-poll-q" id="pollQuestion"></div>
    <div class="rc-poll-opts" id="pollOptions"></div>
    <div class="rc-poll-voted-msg" id="pollVotedMsg">✓ Vote recorded!</div>
</div>

<div class="rc-disconnected" id="disconnected">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/></svg>
    Session ended
    <div style="font-size:0.82rem;font-weight:400;color:#94a3b8">The presenter has closed this session</div>
</div>

<div class="rc-toast" id="toast"></div>

<script>
(function() {
    const API  = "{% url 'individual:deck_remote_api' token=session.session_token %}";
    const STATE = "{% url 'individual:deck_remote_state' token=session.session_token %}";
    const CSRF = '{{ csrf_token }}';
    function getCookie(name) {
        const v = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
        return v ? v.pop() : '';
    }
    const numEl = document.getElementById('slideNum');
    const totalEl = document.getElementById('totalSlides');
    const bar = document.getElementById('progressBar');
    const gotoIn = document.getElementById('gotoInput');
    let currentSlide = {{ session.current_slide }};
    let total = {{ session.total_slides }};

    function updateUI(slide, tot) {
        currentSlide = slide;
        total = tot || total;
        numEl.textContent = slide + 1;
        totalEl.textContent = total;
        const pct = total > 1 ? ((slide) / (total - 1)) * 100 : 0;
        bar.style.width = pct + '%';
        gotoIn.max = total;
    }
    updateUI(currentSlide, total);

    function toast(msg, isError) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.toggle('error', !!isError);
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show', 'error'), 1500);
    }

    window.sendCmd = function(cmd) {
        /* Haptic feedback */
        if (navigator.vibrate) navigator.vibrate(25);

        /* Optimistic UI: update counter instantly for nav commands */
        if (cmd === 'next' && currentSlide < total - 1) updateUI(currentSlide + 1, total);
        else if (cmd === 'prev' && currentSlide > 0) updateUI(currentSlide - 1, total);
        else if (cmd === 'first') updateUI(0, total);
        else if (cmd === 'last') updateUI(total - 1, total);
        else if (cmd.startsWith('goto:')) {
            var n = parseInt(cmd.split(':')[1]);
            if (!isNaN(n) && n >= 0 && n < total) updateUI(n, total);
        }

        fetch(API + '?cmd=' + encodeURIComponent(cmd), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') || CSRF },
            body: JSON.stringify({ command: cmd }),
        }).then(function(r) {
            if (!r.ok) {
                return r.text().then(function(body) {
                    throw new Error('HTTP ' + r.status + ': ' + body.substring(0, 80));
                });
            }
            return r.json();
        }).then(function(d) {
            if (!d.ok && d.error) toast(d.error, true);
        }).catch(function(err) {
            console.error('sendCmd error:', cmd, err);
            toast('Cmd failed: ' + (err.message || 'network error'), true);
        });
    };

    window.gotoSlide = function() {
        const n = parseInt(gotoIn.value);
        if (n >= 1 && n <= total) {
            sendCmd('goto:' + (n - 1));
            gotoIn.value = '';
        }
    };
    gotoIn.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); gotoSlide(); }
    });

    /* Poll for state every 600ms */
    let failCount = 0;
    let _currentPollToken = null;
    let _voterId = localStorage.getItem('_rc_voter_id');
    if (!_voterId) { _voterId = crypto.randomUUID(); localStorage.setItem('_rc_voter_id', _voterId); }

    function renderPoll(poll) {
        if (!poll) {
            document.getElementById('pollSection').classList.remove('active');
            _currentPollToken = null;
            return;
        }
        if (poll.poll_token === _currentPollToken) return; /* already showing */
        _currentPollToken = poll.poll_token;
        document.getElementById('pollQuestion').textContent = poll.question;
        const wrap = document.getElementById('pollOptions');
        wrap.innerHTML = poll.options.map(function(opt, i) {
            var letter = String.fromCharCode(65 + i);
            return '<div class="rc-poll-opt" data-choice="' + i + '" onclick="votePoll(' + i + ')">' +
                '<span class="opt-letter">' + letter + '</span>' + opt + '</div>';
        }).join('');
        document.getElementById('pollVotedMsg').classList.remove('show');
        document.getElementById('pollSection').classList.add('active');
    }

    window.votePoll = function(choice) {
        if (!_currentPollToken) return;
        var voteUrl = '/u/tools/presentations/poll/' + _currentPollToken + '/vote/';
        fetch(voteUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') || CSRF },
            body: JSON.stringify({ choice: choice, voter_id: _voterId }),
        }).then(function(r) { return r.json(); }).then(function(d) {
            if (d.ok) {
                document.querySelectorAll('.rc-poll-opt').forEach(function(el) { el.classList.remove('voted'); });
                var voted = document.querySelector('.rc-poll-opt[data-choice="' + choice + '"]');
                if (voted) voted.classList.add('voted');
                document.getElementById('pollVotedMsg').classList.add('show');
                toast('Vote recorded!');
            }
        }).catch(function() {});
    };

    function pollState() {
        var url = STATE + '?phone=1';
        /* Piggyback laser coords on the poll — no extra requests */
        if (_pendingLaserX >= 0 && _pendingLaserY >= 0) {
            url += '&lx=' + _pendingLaserX.toFixed(4) + '&ly=' + _pendingLaserY.toFixed(4);
        } else if (_pendingLaserOff) {
            url += '&lx=-1&ly=-1';
            _pendingLaserOff = false;
        }
        fetch(url).then(r => r.json()).then(d => {
            failCount = 0;
            document.getElementById('rcBadge').textContent = 'Connected — Remote Control';
            if (!d.is_active) {
                document.getElementById('disconnected').classList.add('show');
                return;
            }
            updateUI(d.current_slide, d.total_slides);
            updateGridHighlight();
            renderPoll(d.active_poll);
            /* Slide title + preview */
            var infoEl = document.getElementById('slideInfo');
            var titleEl = document.getElementById('slideTitle');
            var curTitle = document.getElementById('curPreviewTitle');
            var nxtTitle = document.getElementById('nextPreviewTitle');
            var curCard = document.getElementById('curPreview');
            var nxtCard = document.getElementById('nextPreview');
            if (d.slide_title || d.slide_image || d.next_slide_title || d.next_slide_image) {
                infoEl.style.display = 'block';
                titleEl.textContent = d.slide_title || '';
                curTitle.textContent = d.slide_title || 'Slide ' + (d.current_slide + 1);
                nxtTitle.textContent = d.next_slide_title || (d.current_slide + 1 < d.total_slides ? 'Slide ' + (d.current_slide + 2) : 'End');
                /* Image thumbnails */
                var curImg = curCard.querySelector('img');
                if (d.slide_image) {
                    if (!curImg) { curImg = document.createElement('img'); curCard.insertBefore(curImg, curCard.querySelector('.title')); }
                    curImg.src = d.slide_image;
                } else if (curImg) { curImg.remove(); }
                var nxtImg = nxtCard.querySelector('img');
                if (d.next_slide_image) {
                    if (!nxtImg) { nxtImg = document.createElement('img'); nxtCard.insertBefore(nxtImg, nxtCard.querySelector('.title')); }
                    nxtImg.src = d.next_slide_image;
                } else if (nxtImg) { nxtImg.remove(); }
            } else {
                infoEl.style.display = 'none';
            }
            /* Speaker notes */
            var notesEl = document.getElementById('speakerNotes');
            var notesText = document.getElementById('notesText');
            if (d.speaker_notes) {
                notesText.textContent = d.speaker_notes;
                notesEl.classList.add('active');
            } else {
                notesEl.classList.remove('active');
            }
        }).catch(err => {
            failCount++;
            console.warn('Poll fail #' + failCount, err);
            if (failCount > 5) document.getElementById('rcBadge').textContent = 'Reconnecting… (' + (err.message || '') + ')';
            if (failCount > 10) document.getElementById('disconnected').classList.add('show');
        });
    }
    pollState();
    var _pollInterval = setInterval(pollState, 500);

    /* ── Laser pointer touchpad ── */
    var laserActive = false;
    var laserOverlay = document.getElementById('laserOverlay');
    var laserSurface = document.getElementById('laserSurface');
    var laserCrosshair = document.getElementById('laserCrosshair');
    var laserTouchDot = document.getElementById('laserTouchDot');
    var laserToggleBtn = document.getElementById('laserToggle');
    var _pendingLaserX = -1;
    var _pendingLaserY = -1;
    var _pendingLaserOff = false;

    function setLaserPollRate(fast) {
        clearInterval(_pollInterval);
        _pollInterval = setInterval(pollState, fast ? 150 : 500);
    }

    /* ── Blackout toggle ── */
    var blackoutActive = false;
    window.toggleBlackout = function() {
        blackoutActive = !blackoutActive;
        document.getElementById('blackoutBtn').classList.toggle('active', blackoutActive);
        sendCmd(blackoutActive ? 'blackout:on' : 'blackout:off');
        if (navigator.vibrate) navigator.vibrate(30);
    };

    /* ── Remote Draw toggle ── */
    var drawActive = false;
    var currentDrawColor = '#ef4444';
    window.toggleRemoteDraw = function() {
        drawActive = !drawActive;
        document.getElementById('drawBtn').classList.toggle('active', drawActive);
        document.getElementById('drawPanel').classList.toggle('active', drawActive);
        sendCmd(drawActive ? 'draw:on' : 'draw:off');
        if (navigator.vibrate) navigator.vibrate(20);
    };
    window.pickDrawColor = function(dot, hex) {
        currentDrawColor = hex;
        document.querySelectorAll('.rc-color-dot').forEach(function(d) { d.classList.remove('sel'); });
        dot.classList.add('sel');
        sendCmd('draw:color:' + hex);
        if (navigator.vibrate) navigator.vibrate(10);
    };

    /* ── Slide grid ── */
    var slidesData = [];
    try { slidesData = {{ slides_json|safe }}; } catch(e) { console.warn('slidesData parse error', e); }
    var gridBuilt = false;
    function buildGrid() {
        var body = document.getElementById('slideGridBody');
        body.innerHTML = '';
        slidesData.forEach(function(s) {
            var tile = document.createElement('div');
            tile.className = 'rc-grid-tile' + (s.i === currentSlide ? ' current' : '');
            tile.setAttribute('data-idx', s.i);
            var inner = '<span class="num">' + (s.i + 1) + '</span>';
            if (s.e) inner += '<span class="emoji">' + s.e + '</span>';
            if (s.t) inner += '<span class="ttl">' + s.t + '</span>';
            tile.innerHTML = inner;
            tile.onclick = function() {
                sendCmd('goto:' + s.i);
                closeSlideGrid();
                if (navigator.vibrate) navigator.vibrate(15);
            };
            body.appendChild(tile);
        });
        gridBuilt = true;
    }
    function updateGridHighlight() {
        if (!gridBuilt) return;
        document.querySelectorAll('.rc-grid-tile').forEach(function(t) {
            t.classList.toggle('current', parseInt(t.getAttribute('data-idx')) === currentSlide);
        });
    }
    window.openSlideGrid = function() {
        if (!gridBuilt) buildGrid();
        updateGridHighlight();
        document.getElementById('slideGridOverlay').classList.add('active');
        if (navigator.vibrate) navigator.vibrate(15);
    };
    window.closeSlideGrid = function() {
        document.getElementById('slideGridOverlay').classList.remove('active');
    };

    window.toggleLaserPad = function() {
        laserActive = !laserActive;
        laserOverlay.classList.toggle('active', laserActive);
        laserToggleBtn.classList.toggle('active', laserActive);
        if (!laserActive) {
            _pendingLaserX = -1;
            _pendingLaserY = -1;
            _pendingLaserOff = true;
            laserCrosshair.classList.remove('active');
            laserTouchDot.classList.remove('active');
            setLaserPollRate(false);
            pollState(); /* send laser:off immediately */
        } else {
            setLaserPollRate(true);
        }
        if (navigator.vibrate) navigator.vibrate(20);
    };

    function laserFromTouch(e) {
        var t = e.touches[0];
        var rect = laserSurface.getBoundingClientRect();
        var x = (t.clientX - rect.left) / rect.width;
        var y = (t.clientY - rect.top) / rect.height;
        x = Math.max(0, Math.min(1, x));
        y = Math.max(0, Math.min(1, y));
        /* Move local indicators */
        laserCrosshair.style.left = (x * 100) + '%';
        laserCrosshair.style.top = (y * 100) + '%';
        laserCrosshair.classList.add('active');
        laserTouchDot.style.left = (x * 100) + '%';
        laserTouchDot.style.top = (y * 100) + '%';
        laserTouchDot.classList.add('active');
        /* Store coords — next poll will send them */
        _pendingLaserX = x;
        _pendingLaserY = y;
    }

    laserSurface.addEventListener('touchstart', function(e) {
        e.preventDefault();
        if (navigator.vibrate) navigator.vibrate(10);
        laserFromTouch(e);
    }, { passive: false });

    laserSurface.addEventListener('touchmove', function(e) {
        e.preventDefault();
        laserFromTouch(e);
    }, { passive: false });

    laserSurface.addEventListener('touchend', function(e) {
        e.preventDefault();
        laserCrosshair.classList.remove('active');
        laserTouchDot.classList.remove('active');
        _pendingLaserX = -1;
        _pendingLaserY = -1;
        _pendingLaserOff = true;
        pollState(); /* send laser:off immediately */
    }, { passive: false });

    /* Mouse support for testing on desktop */
    var _mouseDown = false;
    laserSurface.addEventListener('mousedown', function(e) {
        _mouseDown = true;
        laserMouseMove(e);
    });
    laserSurface.addEventListener('mousemove', function(e) {
        if (!_mouseDown) return;
        laserMouseMove(e);
    });
    laserSurface.addEventListener('mouseup', function() {
        _mouseDown = false;
        laserCrosshair.classList.remove('active');
        laserTouchDot.classList.remove('active');
        _pendingLaserX = -1;
        _pendingLaserY = -1;
        _pendingLaserOff = true;
        pollState();
    });
    laserSurface.addEventListener('mouseleave', function() {
        if (_mouseDown) {
            _mouseDown = false;
            laserCrosshair.classList.remove('active');
            laserTouchDot.classList.remove('active');
            _pendingLaserX = -1;
            _pendingLaserY = -1;
            _pendingLaserOff = true;
            pollState();
        }
    });
    function laserMouseMove(e) {
        var rect = laserSurface.getBoundingClientRect();
        var x = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        var y = Math.max(0, Math.min(1, (e.clientY - rect.top) / rect.height));
        laserCrosshair.style.left = (x * 100) + '%';
        laserCrosshair.style.top = (y * 100) + '%';
        laserCrosshair.classList.add('active');
        laserTouchDot.style.left = (x * 100) + '%';
        laserTouchDot.style.top = (y * 100) + '%';
        laserTouchDot.classList.add('active');
        _pendingLaserX = x;
        _pendingLaserY = y;
    }

    /* Swipe support (disabled when laser overlay is open) */
    let touchX = 0;
    document.addEventListener('touchstart', e => { if (!laserActive) touchX = e.changedTouches[0].clientX; }, { passive: true });
    document.addEventListener('touchend', e => {
        if (laserActive) return;
        const dx = e.changedTouches[0].clientX - touchX;
        if (Math.abs(dx) > 80) sendCmd(dx < 0 ? 'next' : 'prev');
    }, { passive: true });
})();
</script>
</body>
</html>
