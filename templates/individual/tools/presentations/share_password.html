<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{ deck.title }} — Password Required</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Manrope',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);color:#f1f5f9}
.card{background:rgba(30,41,59,.85);backdrop-filter:blur(12px);border:1px solid rgba(124,58,237,.15);border-radius:16px;padding:40px;max-width:400px;width:90%;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.4)}
.icon{font-size:3rem;margin-bottom:16px}
h1{font-size:1.2rem;font-weight:700;margin-bottom:6px}
.subtitle{font-size:.82rem;color:#94a3b8;margin-bottom:24px}
.error{color:#ef4444;font-size:.78rem;margin-bottom:12px;padding:8px;background:rgba(239,68,68,.1);border-radius:8px}
.field{width:100%;padding:12px 16px;font-size:.9rem;border-radius:10px;border:1px solid rgba(255,255,255,.12);background:rgba(15,23,42,.6);color:#f1f5f9;margin-bottom:16px;font-family:inherit}
.field:focus{outline:none;border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.2)}
.btn{width:100%;padding:12px;font-size:.9rem;font-weight:600;border:none;border-radius:10px;background:linear-gradient(135deg,#7c3aed 0%,#4361ee 100%);color:#fff;cursor:pointer;font-family:inherit;transition:transform .15s}
.btn:hover{transform:translateY(-1px)}
</style>
</head>
<body>
<div class="card">
    <div class="icon">🔒</div>
    <h1>{{ deck.title|truncatechars:50 }}</h1>
    <p class="subtitle">This presentation is password-protected</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post">
        {% csrf_token %}
        <input class="field" type="password" name="password" placeholder="Enter password…" autofocus required>
        <button class="btn" type="submit">Unlock Presentation</button>
    </form>
</div>
</body>
</html>
