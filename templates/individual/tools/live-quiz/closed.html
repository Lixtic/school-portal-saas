<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Closed — SchoolPadi</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8fafc;color:#0b1120;min-height:100vh;display:flex;align-items:center;justify-content:center;}
        .box{text-align:center;max-width:380px;padding:2rem;background:#fff;border-radius:16px;border:1px solid #e2e6ef;box-shadow:0 4px 24px rgba(0,0,0,.06);}
        .icon{font-size:3rem;margin-bottom:.5rem;color:#ef4444;}
        h1{font-size:1.2rem;font-weight:800;margin-bottom:.3rem;}
        p{font-size:.85rem;color:#6b7a90;line-height:1.5;}
        .code{font-family:monospace;font-weight:800;font-size:1rem;color:#2563eb;letter-spacing:.1em;margin-top:.4rem;display:block;}
    </style>
</head>
<body>
    <div class="box">
        <div class="icon"><i class="bi bi-lock-fill"></i></div>
        <h1>Quiz Closed</h1>
        <p><strong>{{ quiz.title }}</strong> is not accepting responses right now. Ask your teacher to open it.</p>
        <span class="code">{{ quiz.join_code }}</span>
    </div>
</body>
</html>
