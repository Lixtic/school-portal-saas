{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Reset Password{% endblock %}

{% block extra_css %}
<style>
[data-bs-theme="dark"] .pw-card {
    background-color: #1e2130;
    border-color: rgba(255,255,255,0.08) !important;
}
[data-bs-theme="dark"] .pw-card .form-control,
[data-bs-theme="dark"] .pw-card .form-select {
    background-color: #2a2f45;
    border-color: rgba(255,255,255,0.12);
    color: #e2e8f0;
}
[data-bs-theme="dark"] .pw-card .form-control::placeholder { color: #64748b; }
[data-bs-theme="dark"] .pw-card .form-control:focus {
    background-color: #2a2f45;
    border-color: var(--bs-primary);
    color: #e2e8f0;
    box-shadow: 0 0 0 0.2rem rgba(var(--bs-primary-rgb), 0.25);
}
[data-bs-theme="dark"] .pw-card label { color: #94a3b8; }
[data-bs-theme="dark"] .pw-card .text-muted { color: #64748b !important; }
[data-bs-theme="dark"] .pw-card h3 { color: #f1f5f9; }
[data-bs-theme="dark"] .pw-icon-box {
    background-color: rgba(var(--bs-primary-rgb), 0.15) !important;
}
</style>
{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card border-0 shadow-lg rounded-4 pw-card">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="bg-primary bg-opacity-10 rounded-circle d-inline-flex align-items-center justify-content-center mb-3 pw-icon-box" style="width: 60px; height: 60px;">
                        <i class="bi bi-key text-primary fs-3"></i>
                    </div>
                    <h3 class="fw-bold mb-1">Forgot Password?</h3>
                    <p class="text-muted small">Enter your email to receive reset instructions.</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary rounded-pill py-2">
                            Send Reset Link
                        </button>
                        <a href="{% url 'login' %}" class="btn btn-outline-secondary rounded-pill py-2">
                            Back to Login
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
