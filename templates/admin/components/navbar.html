{% load static %}
<!-- Admin Navbar Component -->
<nav class="admin-navbar">
    <div class="navbar-content">
        <!-- Mobile Menu Toggle -->
        <button class="navbar-menu-toggle" id="mobileMenuToggle" title="Toggle menu">
            <i class="bi bi-list"></i>
        </button>
        
        <!-- Page Title / Breadcrumb Area (will be populated dynamically if needed) -->
        <div class="navbar-title">
            <span class="current-page"></span>
        </div>
        
        <!-- Right Actions -->
        <div class="navbar-actions">
            <!-- Quick Create (Super Admin Only) -->
            {% if request.user.is_superuser %}
            <a href="{% url 'tenants:superadmin_create_school' %}" 
               class="navbar-action-btn" 
               title="Quick Create School">
                <i class="bi bi-lightning-charge-fill"></i>
                <span class="d-none d-lg-inline">Quick Create</span>
            </a>
            {% endif %}
            
            <!-- Theme Toggle -->
            <button class="navbar-action-btn theme-toggle" id="themeToggle" title="Toggle dark mode">
                <i class="bi bi-moon"></i>
            </button>
            
            <!-- User Menu -->
            <div class="user-menu">
                <img src="{% static 'img/avatar-default.png' %}" 
                     alt="User" class="user-avatar" 
                     title="{{ request.user.first_name }}">
                <span class="user-name d-none d-md-inline">{{ request.user.first_name }}</span>
            </div>
        </div>
    </div>
</nav>

<style>
/* Admin Navbar - Simplified (no duplicate nav) */
.admin-navbar {
    background: var(--admin-card-bg);
    border-bottom: 1px solid var(--admin-border);
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
}

.navbar-content {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1.5rem;
    gap: 1rem;
}

.navbar-title {
    flex: 1;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--admin-text-muted);
}

.navbar-actions {
    display: flex;
    align-items: center;
    gap: 0.75rem;
}

.navbar-action-btn {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 0.875rem;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--admin-text-secondary);
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
}

.navbar-action-btn:hover {
    background: rgba(124, 58, 237, 0.1);
    color: var(--admin-primary);
}

.navbar-action-btn i {
    font-size: 1.1rem;
}

.user-menu {
    display: flex;
    align-items: center;
    gap: 0.625rem;
    padding: 0.375rem 0.75rem;
    border-radius: 999px;
    background: rgba(124, 58, 237, 0.08);
    cursor: pointer;
    transition: all 0.15s;
}

.user-menu:hover {
    background: rgba(124, 58, 237, 0.12);
}

.user-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    object-fit: cover;
}

.user-name {
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--admin-text-primary);
}

.navbar-menu-toggle {
    display: none;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 40px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--admin-text-primary);
    font-size: 1.5rem;
    cursor: pointer;
    transition: all 0.15s;
}

.navbar-menu-toggle:hover {
    background: rgba(124, 58, 237, 0.1);
}

@media (max-width: 1024px) {
    .navbar-menu-toggle {
        display: flex;
    }
}
</style>

<!-- Mobile Navigation Menu -->
<div class="mobile-menu" id="mobileMenu">
    <nav class="mobile-nav">
        <a href="{% url 'tenants:landlord_dashboard' %}" class="mobile-nav-link">
            <i class="bi bi-speedometer2"></i>
            Dashboard
        </a>
        <a href="{% url 'tenants:approval_queue' %}" class="mobile-nav-link">
            <i class="bi bi-clipboard-check"></i>
            Approvals
        </a>
        <a href="{% url 'tenants:revenue_analytics' %}" class="mobile-nav-link">
            <i class="bi bi-graph-up"></i>
            Revenue
        </a>
        <a href="{% url 'tenants:system_health' %}" class="mobile-nav-link">
            <i class="bi bi-activity"></i>
            Health
        </a>
        <a href="{% url 'tenants:support_tickets' %}" class="mobile-nav-link">
            <i class="bi bi-headset"></i>
            Support
        </a>
        <div class="mobile-nav-divider"></div>
        <a href="{% url 'tenants:database_backups' %}" class="mobile-nav-link">
            <i class="bi bi-archive"></i>
            Backups
        </a>
        <div class="mobile-nav-divider"></div>
        <a href="/admin/" class="mobile-nav-link d-lg-none">
            <i class="bi bi-shield-check"></i>
            Full Admin
        </a>
    </nav>
</div>

<style>
    /* Navbar */
    .admin-navbar {
        background: var(--admin-card-bg);
        border-bottom: 1px solid var(--admin-border);
        height: var(--admin-nav-height);
        display: flex;
        align-items: center;
        padding: 0 var(--admin-spacing-lg);
        position: sticky;
        top: 0;
        z-index: 100;
        box-shadow: var(--admin-shadow-sm);
    }
    
    .navbar-content {
        display: flex;
        align-items: center;
        gap: var(--admin-spacing-lg);
        width: 100%;
    }
    
    .navbar-menu-toggle {
        display: none;
        background: none;
        border: none;
        cursor: pointer;
        font-size: 1.25rem;
        color: var(--admin-primary);
        padding: 0;
        width: 40px;
        height: 40px;
        align-items: center;
        justify-content: center;
    }
    
    .navbar-brand {
        display: flex;
        align-items: center;
        gap: var(--admin-spacing-md);
        text-decoration: none;
        font-weight: 600;
        color: var(--admin-text-primary);
        white-space: nowrap;
    }
    
    .navbar-brand a {
        display: flex;
        align-items: center;
        gap: var(--admin-spacing-sm);
        text-decoration: none;
        color: inherit;
    }
    
    .brand-icon {
        font-size: 1.5rem;
        color: var(--admin-primary);
    }
    
    .navbar-menu {
        display: flex;
        gap: var(--admin-spacing-lg);
        flex: 1;
    }
    
    .nav-link {
        color: var(--admin-text-secondary);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: var(--admin-spacing-sm);
        padding: var(--admin-spacing-sm) 0;
        transition: var(--admin-transition-fast);
        white-space: nowrap;
        font-size: 0.95rem;
    }
    
    .nav-link:hover,
    .nav-link.active {
        color: var(--admin-primary);
    }
    
    .nav-link.active {
        font-weight: 600;
        border-bottom: 2px solid var(--admin-primary);
    }
    
    .navbar-actions {
        display: flex;
        align-items: center;
        gap: var(--admin-spacing-lg);
    }
    
    .theme-toggle {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 1.25rem;
        color: var(--admin-text-secondary);
        transition: var(--admin-transition-fast);
        padding: 0;
        display: flex;
        align-items: center;
        width: 40px;
        height: 40px;
        justify-content: center;
        border-radius: var(--admin-radius-md);
    }
    
    .theme-toggle:hover {
        background: var(--admin-bg-secondary);
        color: var(--admin-primary);
    }
    
    .user-menu {
        display: flex;
        align-items: center;
        gap: var(--admin-spacing-md);
        padding: var(--admin-spacing-sm) var(--admin-spacing-md);
        border-radius: var(--admin-radius-md);
        cursor: pointer;
        transition: var(--admin-transition-fast);
    }
    
    .user-menu:hover {
        background: var(--admin-bg-secondary);
    }
    
    .user-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        object-fit: cover;
    }
    
    .user-name {
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--admin-text-primary);
    }
    
    /* Mobile Menu */
    .mobile-menu {
        display: none;
        position: fixed;
        top: var(--admin-nav-height);
        left: 0;
        right: 0;
        background: var(--admin-card-bg);
        border-bottom: 1px solid var(--admin-border);
        max-height: calc(100vh - var(--admin-nav-height));
        overflow-y: auto;
        z-index: 99;
    }
    
    .mobile-menu.active {
        display: block;
    }
    
    .mobile-nav {
        display: flex;
        flex-direction: column;
        padding: var(--admin-spacing-lg) 0;
    }
    
    .mobile-nav-link {
        padding: var(--admin-spacing-lg);
        color: var(--admin-text-secondary);
        text-decoration: none;
        border-bottom: 1px solid var(--admin-border);
        display: flex;
        align-items: center;
        gap: var(--admin-spacing-md);
        transition: var(--admin-transition-fast);
    }
    
    .mobile-nav-link:last-child {
        border-bottom: none;
    }
    
    .mobile-nav-link:hover {
        background: var(--admin-bg-secondary);
        color: var(--admin-primary);
    }
    
    .mobile-nav-divider {
        height: 1px;
        background: var(--admin-border);
        margin: var(--admin-spacing-md) 0;
    }
    
    /* Responsive */
    @media (max-width: 1024px) {
        .navbar-menu-toggle {
            display: flex;
        }
    }
</style>

<script>
    // ===== Sidebar drawer (mobile) =====
    const sidebar  = document.getElementById('adminSidebar');
    const overlay  = document.getElementById('adminSidebarOverlay');
    const menuToggle = document.getElementById('mobileMenuToggle');
    const mobileMenu = document.getElementById('mobileMenu');

    function openSidebar() {
        if (!sidebar) return;
        sidebar.classList.add('active');
        if (overlay) overlay.classList.add('active');
        document.body.style.overflow = 'hidden';
    }
    function closeSidebar() {
        if (!sidebar) return;
        sidebar.classList.remove('active');
        if (overlay) overlay.classList.remove('active');
        document.body.style.overflow = '';
        if (mobileMenu) mobileMenu.classList.remove('active');
    }

    if (menuToggle) {
        menuToggle.addEventListener('click', () => {
            const isOpen = sidebar && sidebar.classList.contains('active');
            isOpen ? closeSidebar() : openSidebar();
        });
    }
    if (overlay) overlay.addEventListener('click', closeSidebar);

    // Close on nav link click
    if (sidebar) {
        sidebar.querySelectorAll('.sidebar-nav-link').forEach(link => {
            link.addEventListener('click', () => {
                if (window.innerWidth <= 1024) closeSidebar();
            });
        });
    }

    // ===== Aura Page Loading Bar =====
    const loaderBar = document.getElementById('auraLoaderBar');
    function startLoader() {
        if (!loaderBar) return;
        loaderBar.classList.remove('done');
        loaderBar.style.width = '0%';
        // Trigger reflow before adding loading class
        void loaderBar.offsetWidth;
        loaderBar.classList.add('loading');
    }
    function finishLoader() {
        if (!loaderBar) return;
        loaderBar.classList.remove('loading');
        loaderBar.classList.add('done');
        setTimeout(() => {
            loaderBar.classList.remove('done');
            loaderBar.style.width = '0%';
        }, 500);
    }
    // Trigger on all anchor clicks (page navigations)
    document.addEventListener('click', e => {
        const anchor = e.target.closest('a[href]');
        if (!anchor) return;
        const href = anchor.getAttribute('href');
        if (!href || href.startsWith('#') || href.startsWith('javascript') ||
            anchor.target === '_blank' || e.ctrlKey || e.metaKey || e.shiftKey) return;
        startLoader();
    });
    // Finish bar when page is fully loaded
    window.addEventListener('load', finishLoader);
    window.addEventListener('pageshow', finishLoader);

    // ===== Theme toggle =====
    const themeToggle = document.getElementById('themeToggle');
    if (themeToggle) {
        themeToggle.addEventListener('click', () => {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-bs-theme') === 'dark';
            html.setAttribute('data-bs-theme', isDark ? 'light' : 'dark');
            localStorage.setItem('admin-theme', isDark ? 'light' : 'dark');
            const icon = themeToggle.querySelector('i');
            icon.className = isDark ? 'bi bi-moon' : 'bi bi-sun';
        });

        const savedTheme = localStorage.getItem('admin-theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
        const icon = themeToggle.querySelector('i');
        icon.className = savedTheme === 'dark' ? 'bi bi-sun' : 'bi bi-moon';
    }
</script>
