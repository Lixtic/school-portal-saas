{% extends "base.html" %}
{% block title %}Delete Presentation{% endblock %}
{% block content %}
<div style="max-width:480px;margin:4rem auto;padding:0 1rem;">
  <div style="background:#1e293b;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:2rem;">
    <h2 style="color:#f1f5f9;font-weight:800;margin-bottom:.5rem;">Delete Presentation?</h2>
    <p style="color:#94a3b8;font-size:.9rem;margin-bottom:1.5rem;">
      <strong style="color:#f1f5f9;">{{ deck.title }}</strong> ({{ deck.slide_count }} slides) will be permanently removed. This cannot be undone.
    </p>
    <form method="post" style="display:flex;gap:8px;">
      {% csrf_token %}
      <a href="{% url 'teachers:presentation_editor' deck.pk %}" style="flex:1;padding:.7rem;border-radius:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#94a3b8;font-weight:600;text-align:center;text-decoration:none;font-size:.88rem;">Cancel</a>
      <button type="submit" style="flex:1;padding:.7rem;border-radius:10px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#f87171;font-weight:700;font-size:.88rem;cursor:pointer;">Delete</button>
    </form>
  </div>
</div>
{% endblock %}
