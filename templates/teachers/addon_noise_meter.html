{% extends 'base.html' %}
{% block title %}Noise Meter{% endblock %}

{% block content %}
<style>
:root{--nm-bg:#f4f6fb;--nm-card:#fff;--nm-ink:#0b1120;--nm-muted:#8892a4;--nm-border:#e4e8f2;--nm-accent:#4361ee;--nm-accent2:#7c3aed;}
[data-bs-theme="dark"]{--nm-bg:#0f172a;--nm-card:#1e293b;--nm-ink:#f1f5f9;--nm-muted:#94a3b8;--nm-border:#334155;}
.nm-wrap{max-width:560px;margin:0 auto;padding:1rem .5rem;}
.nm-hero{background:linear-gradient(135deg,var(--nm-accent),var(--nm-accent2));border-radius:16px;padding:1.2rem 1.6rem;margin-bottom:1rem;color:#fff;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;}
.nm-hero h1{margin:0;font-size:1.2rem;font-weight:800;letter-spacing:-.02em;}
.nm-hero-sub{font-size:.78rem;opacity:.85;margin-top:.1rem;}
.nm-card{background:var(--nm-card);border:1px solid var(--nm-border);border-radius:18px;overflow:hidden;}
.nm-head{padding:.8rem 1.5rem;border-bottom:1px solid var(--nm-border);display:flex;align-items:center;justify-content:space-between;}
.nm-head h2{margin:0;font-size:1rem;font-weight:800;color:var(--nm-ink);}
.nm-body{padding:2rem 1.5rem;text-align:center;position:relative;}
.nm-meter-wrap{position:relative;width:260px;height:260px;margin:0 auto 1.5rem;}
.nm-ring{fill:none;stroke-linecap:round;transition:stroke-dashoffset .15s,stroke .15s;}
.nm-ring-bg{fill:none;stroke:var(--nm-border);stroke-linecap:round;}
.nm-level-text{font-family:'Manrope',sans-serif;font-size:3.2rem;font-weight:900;fill:var(--nm-ink);transition:fill .3s;}
.nm-label-text{font-family:'Manrope',sans-serif;font-size:.85rem;font-weight:700;fill:var(--nm-muted);text-transform:uppercase;letter-spacing:.05em;}
.nm-status{font-size:1.1rem;font-weight:800;margin-bottom:.5rem;transition:color .3s;}
.nm-status.quiet{color:#10b981;}
.nm-status.moderate{color:#f59e0b;}
.nm-status.loud{color:#ef4444;}
.nm-hint{font-size:.78rem;color:var(--nm-muted);margin-bottom:1.2rem;}
.nm-controls{display:flex;gap:.5rem;justify-content:center;}
.nm-btn{padding:.5rem 1.5rem;border-radius:10px;border:none;font-size:.88rem;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .15s;}
.nm-btn:hover{transform:scale(1.04);}
.nm-btn-go{background:linear-gradient(135deg,var(--nm-accent),var(--nm-accent2));color:#fff;}
.nm-btn-go:hover{box-shadow:0 4px 16px rgba(67,97,238,.35);}
.nm-btn-stop{background:#ef4444;color:#fff;}
.nm-btn-stop:hover{box-shadow:0 4px 12px rgba(239,68,68,.3);}
.nm-threshold{margin-top:1.2rem;padding-top:1rem;border-top:1px solid var(--nm-border);}
.nm-threshold label{font-size:.75rem;font-weight:700;color:var(--nm-muted);text-transform:uppercase;}
.nm-threshold input[type=range]{width:200px;accent-color:var(--nm-accent);}
.nm-fs-btn{position:absolute;top:.8rem;right:.8rem;background:none;border:none;color:var(--nm-muted);font-size:1.1rem;cursor:pointer;transition:color .15s;}
.nm-fs-btn:hover{color:var(--nm-accent);}
.nm-fullscreen{position:fixed!important;inset:0;z-index:9999;background:var(--nm-card);border-radius:0!important;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.nm-fullscreen .nm-meter-wrap{width:400px;height:400px;}
.nm-fullscreen .nm-level-text{font-size:5rem;}
</style>

<div class="nm-wrap">
<!-- Hero -->
<div class="nm-hero">
    <div>
        <h1><i class="bi bi-soundwave me-2"></i>Noise Meter</h1>
        <div class="nm-hero-sub">Monitor classroom noise levels in real-time</div>
    </div>
</div>
<div class="nm-card" id="nmCard">
    <div class="nm-head">
        <h2><i class="bi bi-mic me-2" style="color:var(--nm-accent);"></i>Live Monitor</h2>
        <button class="nm-fs-btn" onclick="document.getElementById('nmCard').classList.toggle('nm-fullscreen')" title="Fullscreen"><i class="bi bi-arrows-fullscreen"></i></button>
    </div>
    <div class="nm-body">
        <div class="nm-meter-wrap">
            <svg viewBox="0 0 260 260" width="100%" height="100%">
                <circle class="nm-ring-bg" cx="130" cy="130" r="110" stroke-width="14" transform="rotate(-90 130 130)"
                        stroke-dasharray="691" stroke-dashoffset="172"/>
                <circle class="nm-ring" id="ring" cx="130" cy="130" r="110" stroke-width="14"
                        stroke="#10b981" transform="rotate(-90 130 130)"
                        stroke-dasharray="691" stroke-dashoffset="691"/>
                <text class="nm-level-text" id="levelText" x="130" y="130" text-anchor="middle" dominant-baseline="central">0</text>
                <text class="nm-label-text" x="130" y="175" text-anchor="middle">noise level</text>
            </svg>
        </div>
        <div class="nm-status quiet" id="statusText">Waiting…</div>
        <div class="nm-hint">Uses your device microphone. Click Start to begin.</div>
        <div class="nm-controls">
            <button class="nm-btn nm-btn-go" id="goBtn" onclick="startMeter()"><i class="bi bi-mic-fill me-1"></i>Start</button>
            <button class="nm-btn nm-btn-stop" id="stopBtn" onclick="stopMeter()" style="display:none;"><i class="bi bi-stop-fill me-1"></i>Stop</button>
        </div>
        <div class="nm-threshold">
            <label>Threshold: <span id="threshVal">60</span>%</label><br>
            <input type="range" id="threshSlider" min="20" max="90" value="60" oninput="document.getElementById('threshVal').textContent=this.value">
        </div>
    </div>
</div>
</div>

<script>
let audioCtx,analyser,mic,animId,active=false;
const ring=document.getElementById('ring'),levelText=document.getElementById('levelText');
const statusText=document.getElementById('statusText');
const MAX_DASH=691,VISIBLE=691-172; // 75% of circle

async function startMeter(){
    try{
        const stream=await navigator.mediaDevices.getUserMedia({audio:true});
        audioCtx=new AudioContext();
        analyser=audioCtx.createAnalyser();
        analyser.fftSize=256;
        mic=audioCtx.createMediaStreamSource(stream);
        mic.connect(analyser);
        active=true;
        document.getElementById('goBtn').style.display='none';
        document.getElementById('stopBtn').style.display='';
        tick();
    }catch(e){
        alert('Microphone access denied. Please allow microphone access.');
    }
}
function stopMeter(){
    active=false;cancelAnimationFrame(animId);
    if(audioCtx)audioCtx.close();
    document.getElementById('goBtn').style.display='';
    document.getElementById('stopBtn').style.display='none';
    ring.style.strokeDashoffset=MAX_DASH;
    levelText.textContent='0';
    statusText.textContent='Stopped';statusText.className='nm-status quiet';
}
function tick(){
    if(!active)return;
    const data=new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    const avg=data.reduce((a,b)=>a+b,0)/data.length;
    const pct=Math.min(100,Math.round((avg/128)*100));
    // Update ring
    const offset=MAX_DASH-((pct/100)*VISIBLE);
    ring.style.strokeDashoffset=offset;
    levelText.textContent=pct;
    const thresh=parseInt(document.getElementById('threshSlider').value);
    if(pct<thresh*0.5){
        ring.style.stroke='#10b981';levelText.style.fill='#10b981';
        statusText.textContent='🤫 Quiet';statusText.className='nm-status quiet';
    }else if(pct<thresh){
        ring.style.stroke='#f59e0b';levelText.style.fill='#f59e0b';
        statusText.textContent='⚠️ Getting Louder';statusText.className='nm-status moderate';
    }else{
        ring.style.stroke='#ef4444';levelText.style.fill='#ef4444';
        statusText.textContent='🔴 Too Loud!';statusText.className='nm-status loud';
    }
    animId=requestAnimationFrame(tick);
}
</script>
{% endblock %}
