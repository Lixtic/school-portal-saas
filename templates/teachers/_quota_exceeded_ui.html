{# Shared quota-exceeded toast — {% include 'teachers/_quota_exceeded_ui.html' %} #}
<div id="aiQuotaToast" style="display:none;position:fixed;top:1.25rem;right:1.25rem;z-index:10000;width:340px;" role="alert" aria-live="assertive">
  <div style="background:#1e293b;border:1.5px solid #ef4444;border-radius:14px;padding:1.1rem 1.25rem;box-shadow:0 12px 40px rgba(0,0,0,.5);">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;">
      <div style="display:flex;align-items:center;gap:.5rem;">
        <span style="font-size:1.2rem;">🚫</span>
        <strong style="color:#f87171;font-size:.88rem;letter-spacing:.01em;">Monthly AI Quota Reached</strong>
      </div>
      <button onclick="document.getElementById('aiQuotaToast').style.display='none'"
              style="background:none;border:none;color:#64748b;font-size:1rem;cursor:pointer;line-height:1;padding:0 .2rem;"
              aria-label="Dismiss">&times;</button>
    </div>
    <p id="aiQuotaMsg" style="color:#94a3b8;font-size:.82rem;margin:.15rem 0 .85rem;line-height:1.5;"></p>
    <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;">
      <a id="aiQuotaUpgradeLink" href="/tenants/subscription/"
         style="background:#6366f1;color:#fff;border-radius:8px;padding:.38rem .85rem;font-size:.8rem;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:.35rem;">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        Upgrade Plan
      </a>
      <span style="color:#475569;font-size:.75rem;">or contact your admin</span>
    </div>
  </div>
</div>

{# Insufficient credits toast — amber-themed #}
<div id="insufficientCreditsToast" style="display:none;position:fixed;top:1.25rem;right:1.25rem;z-index:10001;width:360px;" role="alert" aria-live="assertive">
  <div style="background:#1e293b;border:1.5px solid #f59e0b;border-radius:14px;padding:1.1rem 1.25rem;box-shadow:0 12px 40px rgba(0,0,0,.5);">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;">
      <div style="display:flex;align-items:center;gap:.5rem;">
        <span style="font-size:1.2rem;">🪙</span>
        <strong style="color:#fbbf24;font-size:.88rem;letter-spacing:.01em;">Not Enough Credits</strong>
      </div>
      <button onclick="document.getElementById('insufficientCreditsToast').style.display='none'"
              style="background:none;border:none;color:#64748b;font-size:1rem;cursor:pointer;line-height:1;padding:0 .2rem;"
              aria-label="Dismiss">&times;</button>
    </div>
    <p id="insufficientCreditsMsg" style="color:#94a3b8;font-size:.82rem;margin:.15rem 0 .85rem;line-height:1.5;"></p>
    <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;">
      <a href="{% url 'teachers:teacher_store' %}#creditPacks"
         style="background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;border-radius:8px;padding:.38rem .85rem;font-size:.8rem;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:.35rem;">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        Buy Credits
      </a>
      <span style="color:#475569;font-size:.75rem;">to continue generating</span>
    </div>
  </div>
</div>

<script>
function showAiQuotaExceeded(used, limit, addonBoost) {
  var msg = document.getElementById('aiQuotaMsg');
  if (limit && parseInt(limit) > 0) {
    var txt = 'You\u2019ve used ' + used + ' of ' + limit + ' AI calls this month.';
    if (addonBoost && parseInt(addonBoost) > 0) {
      var base = parseInt(limit) - parseInt(addonBoost);
      txt += ' (Plan: ' + base + ' + Add-on boosts: +' + addonBoost + ')';
    }
    txt += ' Upgrade your plan or purchase add-ons to continue.';
    msg.textContent = txt;
  } else {
    msg.textContent = 'Your school\u2019s monthly AI quota has been exhausted. Upgrade your plan or purchase add-ons to continue.';
  }
  var toast = document.getElementById('aiQuotaToast');
  toast.style.display = 'block';
  clearTimeout(window._aiQuotaTimer);
  window._aiQuotaTimer = setTimeout(function() { toast.style.display = 'none'; }, 15000);
}

function showInsufficientCredits(balance, cost) {
  var msg = document.getElementById('insufficientCreditsMsg');
  var b = (balance !== null && balance !== undefined) ? balance : 0;
  var c = (cost !== null && cost !== undefined) ? cost : 1;
  msg.textContent = 'This action costs ' + c + ' credit' + (c !== 1 ? 's' : '') + ' but you only have ' + b + '. Purchase more credits to continue.';
  var toast = document.getElementById('insufficientCreditsToast');
  toast.style.display = 'block';
  clearTimeout(window._creditsTimer);
  window._creditsTimer = setTimeout(function() { toast.style.display = 'none'; }, 20000);
}
</script>
