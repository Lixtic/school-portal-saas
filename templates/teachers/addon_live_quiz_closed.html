<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quiz Ended</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Manrope',system-ui,-apple-system,sans-serif;background:#0f172a;color:#f1f5f9;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.closed-wrap{text-align:center;padding:2rem;}
.closed-icon{font-size:3rem;margin-bottom:.5rem;}
.closed-title{font-size:1.3rem;font-weight:800;color:#f59e0b;margin-bottom:.3rem;}
.closed-msg{font-size:.88rem;color:#94a3b8;}
</style>
</head>
<body>
<div class="closed-wrap">
    <div class="closed-icon">⏹️</div>
    <div class="closed-title">{{ quiz.title }}</div>
    <div class="closed-msg">This quiz has ended. Ask your teacher if you missed it!</div>
</div>
</body>
</html>
