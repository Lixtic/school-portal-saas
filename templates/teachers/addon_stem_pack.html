{% extends 'base.html' %}
{% block title %}STEM Activity Pack{% endblock %}

{% block content %}
<style>
:root{--st-card:#fff;--st-ink:#0b1120;--st-muted:#8892a4;--st-border:#e4e8f2;--st-accent:#10b981;}
[data-bs-theme="dark"]{--st-card:#1e293b;--st-ink:#f1f5f9;--st-muted:#94a3b8;--st-border:#334155;}
.st-wrap{max-width:860px;margin:0 auto;padding:1rem 0;}
.st-card{background:var(--st-card);border:1px solid var(--st-border);border-radius:14px;overflow:hidden;margin-bottom:1rem;}
.st-head{padding:1rem 1.3rem;border-bottom:1px solid var(--st-border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;}
.st-head h2{margin:0;font-size:1.1rem;font-weight:800;color:var(--st-ink);}
.st-filters{display:flex;gap:.3rem;flex-wrap:wrap;padding:.8rem 1.3rem;border-bottom:1px solid var(--st-border);}
.st-filter{padding:.3rem .7rem;border-radius:8px;font-size:.78rem;font-weight:600;border:1px solid var(--st-border);background:var(--st-card);color:var(--st-ink);cursor:pointer;text-decoration:none;}
.st-filter.active{background:var(--st-accent);color:#fff;border-color:var(--st-accent);}
.st-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:.8rem;padding:1rem 1.3rem;}
.st-item{border:1px solid var(--st-border);border-radius:12px;padding:.9rem 1rem;background:var(--st-card);transition:box-shadow .15s,transform .15s;}
.st-item:hover{box-shadow:0 6px 20px rgba(0,0,0,.07);transform:translateY(-2px);}
.st-item-icon{font-size:1.5rem;margin-bottom:.4rem;}
.st-item h4{font-size:.92rem;font-weight:700;color:var(--st-ink);margin:0 0 .3rem;}
.st-item p{font-size:.8rem;color:var(--st-muted);margin:0 0 .5rem;line-height:1.5;}
.st-tag{display:inline-block;padding:.12rem .4rem;border-radius:5px;font-size:.68rem;font-weight:600;margin-right:.2rem;}
.st-tag-science{background:rgba(59,130,246,.1);color:#3b82f6;}
.st-tag-math{background:rgba(245,158,11,.1);color:#f59e0b;}
.st-tag-ict{background:rgba(124,58,237,.1);color:#7c3aed;}
.st-tag-level{background:rgba(16,185,129,.1);color:#10b981;}
.st-materials{font-size:.72rem;color:var(--st-muted);margin-top:.4rem;border-top:1px dashed var(--st-border);padding-top:.4rem;}
.st-count{font-size:.78rem;color:var(--st-muted);}
</style>

<div class="st-wrap">
    <div class="st-card">
        <div class="st-head">
            <h2><i class="bi bi-rocket-takeoff me-2" style="color:var(--st-accent);"></i>STEM Activity Pack</h2>
            <span class="st-count" id="activityCount"></span>
        </div>
        <div class="st-filters">
            <button class="st-filter active" onclick="filterCat('all',this)">All</button>
            <button class="st-filter" onclick="filterCat('science',this)">Science</button>
            <button class="st-filter" onclick="filterCat('math',this)">Mathematics</button>
            <button class="st-filter" onclick="filterCat('ict',this)">ICT</button>
        </div>
        <div class="st-grid" id="activityGrid"></div>
    </div>
</div>

<script>
const ACTIVITIES=[
    {t:"Egg Drop Challenge",d:"Design a container to protect an egg from a 3m drop. Tests engineering and material science.",c:"science",lvl:"JHS 1-3",mat:"Eggs, tape, cardboard, straws, newspaper"},
    {t:"Bridge Building",d:"Build a bridge from popsicle sticks that holds the most weight. Explores structural engineering.",c:"science",lvl:"JHS 1-2",mat:"Popsicle sticks, glue, string, small weights"},
    {t:"Water Filtration System",d:"Create a multi-layer filter to clean dirty water. Covers environmental science.",c:"science",lvl:"JHS 2-3",mat:"Plastic bottles, sand, gravel, charcoal, cotton"},
    {t:"Solar Oven",d:"Build a solar oven from a pizza box. Demonstrates heat absorption and renewable energy.",c:"science",lvl:"JHS 1-3",mat:"Pizza box, aluminium foil, cling film, black paper"},
    {t:"Volcano Eruption",d:"Classic baking soda & vinegar volcano. Teaches chemical reactions and gas production.",c:"science",lvl:"JHS 1",mat:"Baking soda, vinegar, dish soap, food colouring"},
    {t:"DNA Extraction",d:"Extract DNA from a banana using household items. Covers cell biology basics.",c:"science",lvl:"JHS 3",mat:"Banana, salt, dish soap, rubbing alcohol, ziplock bag"},
    {t:"Simple Circuit Builder",d:"Wire a battery, switch, and LED bulb. Teaches basic electrical circuits.",c:"science",lvl:"JHS 1-2",mat:"Battery, wires, LED bulbs, switches, tape"},
    {t:"Rocket Launcher",d:"Build a paper rocket launched with a straw. Explores Newton's third law.",c:"science",lvl:"JHS 1-2",mat:"Paper, straws, tape, scissors"},
    {t:"Plant Growth Experiment",d:"Compare plant growth under different conditions. Teaches scientific method.",c:"science",lvl:"JHS 1-3",mat:"Seeds, cups, soil, water, ruler, notebook"},
    {t:"Density Tower",d:"Layer liquids of different densities. Demonstrates mass, volume, and density.",c:"science",lvl:"JHS 1",mat:"Honey, corn syrup, dish soap, water, vegetable oil, rubbing alcohol"},
    {t:"Pythagorean Theorem with Tiles",d:"Use square tiles to prove a² + b² = c² visually. Hands-on geometry.",c:"math",lvl:"JHS 2-3",mat:"Coloured square tiles or paper squares, ruler"},
    {t:"Probability Carnival",d:"Run mini-games (coin toss, dice, cards) to collect data. Teaches probability.",c:"math",lvl:"JHS 1-2",mat:"Coins, dice, playing cards, tally sheets"},
    {t:"Area & Perimeter Mapping",d:"Measure real areas in the school compound. Applies area/perimeter formulas.",c:"math",lvl:"JHS 1-2",mat:"Measuring tape, graph paper, calculator"},
    {t:"Fraction Pizza Party",d:"Cut paper pizzas into fractions. Visual fraction operations.",c:"math",lvl:"JHS 1",mat:"Coloured paper circles, scissors, markers"},
    {t:"Statistics Survey Project",d:"Conduct a class survey, tabulate data, draw charts. Real-world statistics.",c:"math",lvl:"JHS 2-3",mat:"Survey forms, graph paper, rulers, calculators"},
    {t:"Symmetry Art Challenge",d:"Create symmetrical designs using grid paper. Links math and art.",c:"math",lvl:"JHS 1",mat:"Grid paper, coloured pencils, mirrors"},
    {t:"Linear Equation Balance",d:"Use a balance scale to model solving equations. Concrete algebra.",c:"math",lvl:"JHS 2-3",mat:"Balance scale or ruler, small weights or coins"},
    {t:"Ratio Recipes",d:"Scale recipes up and down. Practical ratio and proportion.",c:"math",lvl:"JHS 1-2",mat:"Simple recipe, measuring cups, ingredients"},
    {t:"Spreadsheet Data Analysis",d:"Enter class data into a spreadsheet, create charts. Basic data literacy.",c:"ict",lvl:"JHS 2-3",mat:"Computers with spreadsheet software"},
    {t:"HTML Personal Webpage",d:"Create a simple personal webpage using HTML & CSS. Intro to web development.",c:"ict",lvl:"JHS 3",mat:"Computers, text editor, web browser"},
    {t:"Scratch Animation",d:"Build an animated story or game in Scratch. Teaches programming logic.",c:"ict",lvl:"JHS 1-2",mat:"Computers with Scratch (scratch.mit.edu)"},
    {t:"Typing Speed Challenge",d:"Practice and track typing speed over a term. Digital literacy.",c:"ict",lvl:"JHS 1-3",mat:"Computers, typing practice website"},
    {t:"Presentation Skills",d:"Create a 5-slide class presentation. Teaches digital communication.",c:"ict",lvl:"JHS 1-3",mat:"Computers with presentation software"},
    {t:"Digital Poster Design",d:"Design an educational poster using Canva or similar. Visual communication.",c:"ict",lvl:"JHS 2-3",mat:"Computers, Canva or drawing software"},
    {t:"Binary Number Game",d:"Decode messages using binary. Links math and computing.",c:"ict",lvl:"JHS 2-3",mat:"Binary flashcards, worksheets"},
];

let currentCat='all';
function filterCat(cat,btn){
    currentCat=cat;
    document.querySelectorAll('.st-filter').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    render();
}
function render(){
    const items=currentCat==='all'?ACTIVITIES:ACTIVITIES.filter(a=>a.c===currentCat);
    const grid=document.getElementById('activityGrid');
    document.getElementById('activityCount').textContent=items.length+' activities';
    grid.innerHTML=items.map(a=>`
        <div class="st-item">
            <div class="st-item-icon">${a.c==='science'?'🔬':a.c==='math'?'📐':'💻'}</div>
            <h4>${a.t}</h4>
            <p>${a.d}</p>
            <span class="st-tag st-tag-${a.c}">${a.c==='ict'?'ICT':a.c.charAt(0).toUpperCase()+a.c.slice(1)}</span>
            <span class="st-tag st-tag-level">${a.lvl}</span>
            <div class="st-materials"><i class="bi bi-box-seam me-1"></i>${a.mat}</div>
        </div>`).join('');
}
render();
</script>
{% endblock %}
