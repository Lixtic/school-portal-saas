<!-- SchoolPadi Platform Assistant -->
<div class="assistant-launcher">
    <button type="button" class="btn btn-primary" id="assistantToggle" title="Open SchoolPadi" aria-label="Open SchoolPadi chat assistant">
        <i class="fas fa-robot" aria-hidden="true"></i>
    </button>
</div>
<div class="assistant-panel" id="assistantPanel" role="dialog" aria-label="SchoolPadi Platform Assistant" aria-hidden="true" data-no-loader>
    <div class="assistant-header">
        <span class="fw-bold">SchoolPadi Platform Assistant</span>
        <button type="button" class="btn btn-sm" id="assistantClose" aria-label="Close chat assistant">&times;</button>
    </div>
    <div class="assistant-body" id="assistantBody">
        <div class="assistant-bubble bot">Hi - I'm SchoolPadi. I can explain what the platform does and which features fit your school.</div>
    </div>
    <div class="assistant-input">
        <form id="assistantForm" data-no-loader>
            {% csrf_token %}
            <input type="text" id="assistantQuestion" name="question" placeholder="Ask what the app does for teachers, parents, students, and admins..." required autocomplete="off" aria-label="Ask SchoolPadi a question">
        </form>
    </div>
</div>

<script>
// SchoolPadi Assistant frontend (public home templates)
(function() {
    const panel = document.getElementById('assistantPanel');
    const toggle = document.getElementById('assistantToggle');
    const closeBtn = document.getElementById('assistantClose');
    const body = document.getElementById('assistantBody');
    const form = document.getElementById('assistantForm');
    const input = document.getElementById('assistantQuestion');
    const ROLE_STORAGE_KEY = 'padi_copilot_role';

    if (!panel || !toggle || !closeBtn || !body || !form || !input) {
        return;
    }

    const csrftoken = (name => {
        const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
        return match ? match[2] : '';
    })('csrftoken');

    function appendBubble(text, type) {
        const div = document.createElement('div');
        div.className = 'assistant-bubble ' + type;
        if (type === 'typing') {
            div.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
            div.id = 'typingIndicator';
        } else {
            div.textContent = text;
        }
        body.appendChild(div);
        body.scrollTop = body.scrollHeight;
        return div;
    }

    function removeTypingIndicator() {
        const indicator = document.getElementById('typingIndicator');
        if (indicator) {
            indicator.remove();
        }
    }

    function normalizeRole(text) {
        const raw = (text || '').trim().toLowerCase().replace(/[.!?,:;]+$/g, '');
        const roleMap = {
            student: 'student',
            students: 'student',
            parent: 'parent',
            parents: 'parent',
            teacher: 'teacher',
            teachers: 'teacher',
            staff: 'teacher',
            admin: 'admin',
            administrator: 'admin',
        };
        return roleMap[raw] || '';
    }

    function readStoredRole() {
        try {
            return normalizeRole(window.localStorage.getItem(ROLE_STORAGE_KEY) || '');
        } catch (e) {
            return '';
        }
    }

    function storeRole(role) {
        try {
            if (role) {
                window.localStorage.setItem(ROLE_STORAGE_KEY, role);
            }
        } catch (e) {
            // Ignore storage failures.
        }
    }

    async function streamResponse(res, bubble) {
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let done = false;
        while (!done) {
            const chunk = await reader.read();
            done = chunk.done;
            const text = decoder.decode(chunk.value || new Uint8Array(), { stream: !done });
            if (text) {
                bubble.textContent += text;
                body.scrollTop = body.scrollHeight;
            }
        }
    }

    toggle.addEventListener('click', () => {
        panel.style.display = 'flex';
        panel.setAttribute('aria-hidden', 'false');
        input.focus();
    });

    closeBtn.addEventListener('click', () => {
        panel.style.display = 'none';
        panel.setAttribute('aria-hidden', 'true');
    });

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && panel.style.display === 'flex') {
            panel.style.display = 'none';
            panel.setAttribute('aria-hidden', 'true');
            toggle.focus();
        }
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const question = input.value.trim();
        if (!question) return;

        const roleFromMessage = normalizeRole(question);
        const role = roleFromMessage || readStoredRole();
        if (roleFromMessage) {
            storeRole(roleFromMessage);
        }

        appendBubble(question, 'user');
        input.value = '';
        appendBubble('', 'typing');

        try {
            const res = await fetch('{% url "academics:copilot_assistant" %}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrftoken,
                },
                body: JSON.stringify({ question, role }),
            });

            removeTypingIndicator();

            if (!res.ok || !res.body) {
                appendBubble('Sorry, there was an error processing your request. Please try again.', 'bot');
                return;
            }

            const botBubble = appendBubble('', 'bot');
            await streamResponse(res, botBubble);
        } catch (err) {
            removeTypingIndicator();
            appendBubble('Network issue. Please check your connection and try again.', 'bot');
        }
    });
})();
</script>
