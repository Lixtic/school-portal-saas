<!-- Aura Admissions Assistant -->
<div class="assistant-launcher">
    <button type="button" class="btn btn-primary" id="assistantToggle" title="Open Aura">
        <i class="fas fa-robot"></i>
    </button>
</div>
<div class="assistant-panel" id="assistantPanel" data-no-loader>
    <div class="assistant-header">
        <span class="fw-bold">Aura Admissions Assistant</span>
        <button type="button" class="btn btn-sm" id="assistantClose">&times;</button>
    </div>
    <div class="assistant-body" id="assistantBody">
        <div class="assistant-bubble bot">Hi! I am Aura. Ask me about admissions, classes, schedules, fees, or events.</div>
    </div>
    <div class="assistant-input">
        <form id="assistantForm" data-no-loader>
            <input type="text" id="assistantQuestion" name="question" placeholder="Ask Aura about admissions, fees, or classes..." required autocomplete="off">
        </form>
    </div>
</div>

<script>
// Aura Assistant frontend (public home templates)
(function() {
    const panel = document.getElementById('assistantPanel');
    const toggle = document.getElementById('assistantToggle');
    const closeBtn = document.getElementById('assistantClose');
    const body = document.getElementById('assistantBody');
    const form = document.getElementById('assistantForm');
    const input = document.getElementById('assistantQuestion');

    if (!panel || !toggle || !closeBtn || !body || !form || !input) {
        return;
    }

    const csrftoken = (name => {
        const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
        return match ? match[2] : '';
    })('csrftoken');

    function appendBubble(text, type) {
        const div = document.createElement('div');
        div.className = 'assistant-bubble ' + type;
        if (type === 'typing') {
            div.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
            div.id = 'typingIndicator';
        } else {
            div.textContent = text;
        }
        body.appendChild(div);
        body.scrollTop = body.scrollHeight;
        return div;
    }

    function removeTypingIndicator() {
        const indicator = document.getElementById('typingIndicator');
        if (indicator) {
            indicator.remove();
        }
    }

    async function streamResponse(res, bubble) {
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let done = false;
        while (!done) {
            const chunk = await reader.read();
            done = chunk.done;
            const text = decoder.decode(chunk.value || new Uint8Array(), { stream: !done });
            if (text) {
                bubble.textContent += text;
                body.scrollTop = body.scrollHeight;
            }
        }
    }

    toggle.addEventListener('click', () => {
        panel.style.display = 'flex';
        input.focus();
    });

    closeBtn.addEventListener('click', () => {
        panel.style.display = 'none';
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const question = input.value.trim();
        if (!question) return;

        appendBubble(question, 'user');
        input.value = '';
        appendBubble('', 'typing');

        try {
            const res = await fetch('{% url "academics:copilot_assistant" %}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrftoken,
                },
                body: JSON.stringify({ question, role: 'visitor' }),
            });

            removeTypingIndicator();

            if (!res.ok || !res.body) {
                appendBubble('Sorry, there was an error processing your request. Please try again.', 'bot');
                return;
            }

            const botBubble = appendBubble('', 'bot');
            await streamResponse(res, botBubble);
        } catch (err) {
            removeTypingIndicator();
            appendBubble('Network issue. Please check your connection and try again.', 'bot');
        }
    });
})();
</script>
