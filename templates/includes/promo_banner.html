{% if promo_banners %}
<style>
/* ── Promo Banner ────────────────────────────── */
.padi-promo-wrap { margin-bottom: 1rem; display: flex; flex-direction: column; gap: .65rem; }

.padi-promo {
    position: relative; overflow: hidden;
    border-radius: 14px; padding: 1rem 1.25rem;
    color: #fff;
    animation: promoSlideIn .5s cubic-bezier(.22,1,.36,1) both;
    cursor: default;
}
.padi-promo:nth-child(2) { animation-delay: .1s; }
.padi-promo:nth-child(3) { animation-delay: .2s; }

/* Styles */
.padi-promo.gradient {
    background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #a855f7 100%);
}
.padi-promo.glass {
    background: linear-gradient(135deg, rgba(124,58,237,.55), rgba(67,97,238,.4));
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,.12);
}
.padi-promo.bold {
    background: linear-gradient(135deg, #dc2626 0%, #f59e0b 100%);
}
.padi-promo.minimal {
    background: linear-gradient(135deg, #1e293b, #334155);
    border: 1px solid rgba(255,255,255,.06);
}

/* Shimmer overlay */
.padi-promo::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(105deg,
        transparent 35%,
        rgba(255,255,255,.12) 45%,
        rgba(255,255,255,.18) 50%,
        rgba(255,255,255,.12) 55%,
        transparent 65%
    );
    background-size: 250% 100%;
    animation: promoShimmer 3.5s ease-in-out infinite;
    pointer-events: none;
}

/* Floating orb */
.padi-promo::after {
    content: '';
    position: absolute;
    top: -30px; right: -20px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,.06);
    pointer-events: none;
    animation: promoOrb 6s ease-in-out infinite alternate;
}

.padi-promo-content {
    position: relative; z-index: 1;
    display: flex; align-items: center; gap: 1rem;
    flex-wrap: wrap;
}
.padi-promo-text { flex: 1; min-width: 200px; }
.padi-promo-headline {
    font-family: 'Manrope', system-ui, sans-serif;
    font-weight: 800; font-size: .95rem;
    line-height: 1.25; letter-spacing: -.01em;
    margin-bottom: .15rem;
}
.padi-promo-body {
    font-size: .75rem; opacity: .85;
    line-height: 1.4;
}
.padi-promo-cta {
    display: inline-flex; align-items: center; gap: .3rem;
    padding: .4rem .85rem;
    border-radius: 8px;
    font-size: .72rem; font-weight: 700;
    background: rgba(255,255,255,.18);
    backdrop-filter: blur(4px);
    color: #fff;
    text-decoration: none;
    border: 1px solid rgba(255,255,255,.2);
    transition: background .2s, transform .15s;
    white-space: nowrap;
}
.padi-promo-cta:hover {
    background: rgba(255,255,255,.28);
    transform: translateY(-1px);
    color: #fff;
    text-decoration: none;
}
.padi-promo-dismiss {
    position: absolute; top: .5rem; right: .6rem;
    background: rgba(255,255,255,.12); border: none;
    color: rgba(255,255,255,.6); border-radius: 6px;
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    font-size: .65rem; cursor: pointer; z-index: 2;
    transition: background .15s;
}
.padi-promo-dismiss:hover { background: rgba(255,255,255,.25); color: #fff; }

@keyframes promoSlideIn {
    from { opacity: 0; transform: translateY(-12px) scale(.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes promoShimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}
@keyframes promoOrb {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(-10px, 8px) scale(1.15); }
}

@media (max-width: 576px) {
    .padi-promo { padding: .75rem .9rem; border-radius: 12px; }
    .padi-promo-headline { font-size: .85rem; }
    .padi-promo-content { gap: .6rem; }
}
</style>

<div class="padi-promo-wrap">
    {% for banner in promo_banners %}
    <div class="padi-promo {{ banner.style }}" data-promo-id="{{ banner.pk }}">
        <button class="padi-promo-dismiss" aria-label="Dismiss">
            <i class="bi bi-x"></i>
        </button>
        <div class="padi-promo-content">
            <div class="padi-promo-text">
                <div class="padi-promo-headline">{{ banner.headline }}</div>
                {% if banner.body %}<div class="padi-promo-body">{{ banner.body }}</div>{% endif %}
            </div>
            {% if banner.cta_link %}
            <a href="{{ banner.cta_link }}" class="padi-promo-cta" target="_blank" rel="noopener">
                {{ banner.cta_text }} <i class="bi bi-arrow-right"></i>
            </a>
            {% elif banner.cta_text %}
            <span class="padi-promo-cta">{{ banner.cta_text }}</span>
            {% endif %}
        </div>
    </div>
    {% endfor %}
</div>
<script>
(function(){
    const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]')?.value
                      || '{{ csrf_token }}';
    const hdrs = {'Content-Type':'application/json','X-CSRFToken':csrfToken};
    const tracked = new Set();

    document.querySelectorAll('.padi-promo').forEach(el => {
        const bid = el.dataset.promoId;

        /* ── Impression ── */
        if(bid && !tracked.has(bid)){
            tracked.add(bid);
            fetch('/tenants/promo/track/', {method:'POST', headers:hdrs, credentials:'same-origin',
                body:JSON.stringify({banner_id:bid, event_type:'impression'})}).catch(()=>{});
        }

        /* ── Dismiss (persistent) ── */
        el.querySelector('.padi-promo-dismiss')?.addEventListener('click', () => {
            el.style.opacity='0'; el.style.transform='translateY(-8px)';
            el.style.transition='opacity .25s, transform .25s';
            setTimeout(() => el.remove(), 260);
            if(bid) fetch('/tenants/promo/dismiss/', {method:'POST', headers:hdrs, credentials:'same-origin',
                body:JSON.stringify({banner_id:bid})}).catch(()=>{});
        });

        /* ── CTA Click ── */
        el.querySelector('.padi-promo-cta')?.addEventListener('click', () => {
            if(bid) fetch('/tenants/promo/track/', {method:'POST', headers:hdrs, credentials:'same-origin',
                body:JSON.stringify({banner_id:bid, event_type:'click'})}).catch(()=>{});
        });
    });
})();
</script>
{% endif %}
