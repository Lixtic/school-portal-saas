<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ subject }}</title>
</head>
<body style="margin:0;padding:0;background:#f4f5f7;font-family:'Inter',system-ui,-apple-system,sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f5f7;padding:32px 16px;">
        <tr>
            <td align="center">
                <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06);">
                    <!-- Header -->
                    <tr>
                        <td style="background:linear-gradient(135deg,#4361ee 0%,#7C3AED 100%);padding:28px 32px;text-align:center;">
                            <h1 style="margin:0;font-size:22px;font-weight:800;color:#ffffff;letter-spacing:-0.02em;">
                                SchoolPadi
                            </h1>
                        </td>
                    </tr>
                    <!-- Greeting -->
                    <tr>
                        <td style="padding:28px 32px 8px;">
                            <p style="margin:0;font-size:15px;color:#374151;">
                                Hi {{ recipient_name }},
                            </p>
                        </td>
                    </tr>
                    <!-- Body -->
                    <tr>
                        <td style="padding:12px 32px 28px;font-size:15px;line-height:1.7;color:#374151;">
                            {{ body_html|safe }}
                        </td>
                    </tr>
                    <!-- Footer -->
                    <tr>
                        <td style="background:#f9fafb;padding:20px 32px;border-top:1px solid #e5e7eb;text-align:center;">
                            <p style="margin:0 0 4px;font-size:13px;color:#6b7280;">
                                &copy; SchoolPadi &mdash; Smart School Management
                            </p>
                            <p style="margin:0;font-size:12px;color:#9ca3af;">
                                You received this email because you are part of the SchoolPadi community.
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
