{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Create Assignment{% endblock %}

{% block extra_css %}
<style>
    [data-bs-theme="dark"] .card {
        background: var(--card-bg, #1e293b);
        border-color: rgba(255,255,255,0.08);
    }
    [data-bs-theme="dark"] .card-header {
        background: var(--card-bg, #1e293b) !important;
        border-color: rgba(255,255,255,0.08);
    }
    [data-bs-theme="dark"] .card-body { color: #e2e8f0; }
    [data-bs-theme="dark"] .form-control,
    [data-bs-theme="dark"] .form-select {
        background: rgba(255,255,255,0.05);
        border-color: rgba(255,255,255,0.15);
        color: #e2e8f0;
    }
</style>
{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0">
                <div class="card-header py-3 d-flex justify-content-between align-items-center border-bottom">
                    <h6 class="m-0 fw-bold text-primary">Create New Assignment</h6>
                    <a href="{% url 'homework_list' %}" class="btn btn-sm btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> Back to List
                    </a>
                </div>
                <div class="card-body">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        {{ form|crispy }}
                        
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-check-lg me-2"></i> Publish Assignment
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
